<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Blood Donor BD</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/fd3zk65t/1000018685.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fff5f5, #ffffff, #fff5f5);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .error-container {
            max-width: 600px;
            width: 100%;
            text-align: center;
            animation: fadeInUp 0.6s ease;
        }
        
        .error-icon {
            font-size: 120px;
            color: #b71c1c;
            opacity: 0.3;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        
        .error-code {
            font-size: 120px;
            font-weight: 800;
            color: #b71c1c;
            line-height: 1;
            margin-bottom: 10px;
            text-shadow: 0 4px 20px rgba(183, 28, 28, 0.2);
        }
        
        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 12px;
        }
        
        p {
            color: #666;
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 24px;
        }
        
        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 24px 0 32px;
        }
        
        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: #b71c1c;
            color: white;
        }
        
        .btn-primary:hover {
            background: #8b0000;
            transform: translateY(-3px);
            box-shadow: 0 4px 20px rgba(183, 28, 28, 0.3);
        }
        
        .btn-outline {
            background: transparent;
            border: 2px solid #b71c1c;
            color: #b71c1c;
        }
        
        .btn-outline:hover {
            background: #b71c1c;
            color: white;
            transform: translateY(-3px);
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            max-width: 400px;
            margin: 0 auto 24px;
        }
        
        .search-box input {
            flex: 1;
            padding: 14px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s;
            font-family: inherit;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #b71c1c;
        }
        
        .search-box button {
            padding: 14px 24px;
            background: #b71c1c;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .search-box button:hover {
            background: #8b0000;
        }
        
        .quick-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }
        
        .quick-links a {
            padding: 12px;
            background: #f5f5f5;
            border-radius: 8px;
            text-decoration: none;
            color: #333;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .quick-links a:hover {
            background: #b71c1c;
            color: white;
            transform: translateY(-2px);
        }
        
        .blood-drop {
            display: inline-block;
            animation: pulse 2s infinite;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }
        
        /* Lottie Animation Container */
        .lottie-container {
            width: 200px;
            height: 200px;
            margin: 0 auto 10px;
        }
        
        @media (max-width: 480px) {
            .error-code {
                font-size: 80px;
            }
            .error-icon {
                font-size: 80px;
            }
            h1 {
                font-size: 22px;
            }
            .btn {
                padding: 12px 24px;
                font-size: 14px;
                width: 100%;
                justify-content: center;
            }
            .btn-group {
                flex-direction: column;
            }
            .search-box {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <!-- Lottie Animation -->
        <div class="lottie-container">
            <dotlottie-wc 
                src="https://lottie.host/02c4ddf5-d184-4bb5-af56-750695a160b5/u7gf3fbPlm.json" 
                style="width: 100%; height: 100%;" 
                autoplay 
                loop>
            </dotlottie-wc>
        </div>

        <!-- Error Code -->
        <div class="error-code">404</div>
        
        <!-- Title -->
        <h1>
            <span class="blood-drop">🩸</span> 
            Oops! Page Not Found
            <span class="blood-drop">🩸</span>
        </h1>
        
        <!-- Description -->
        <p>
            The page you're looking for doesn't exist or has been moved.<br>
            But don't worry, we can help you find what you need!
        </p>
        
        <!-- Search Box -->
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search for donors, requests, articles...">
            <button onclick="searchSite()">
                <i class="fas fa-search"></i>
            </button>
        </div>
        
        <!-- Action Buttons -->
        <div class="btn-group">
            <a href="/" class="btn btn-primary">
                <i class="fas fa-home"></i> Go Home
            </a>
            <a href="#find-donors" onclick="router.navigate('find-donors'); return false;" class="btn btn-outline">
                <i class="fas fa-search"></i> Find Donors
            </a>
            <a href="#request-blood" onclick="router.navigate('request-blood'); return false;" class="btn btn-outline">
                <i class="fas fa-tint"></i> Request Blood
            </a>
        </div>
        
        <!-- Quick Links -->
        <div class="quick-links">
            <a href="/#dashboard">Dashboard</a>
            <a href="/#about">About Us</a>
            <a href="/#contact">Contact</a>
            <a href="/#success-stories">Success Stories</a>
            <a href="/#dm-donor">DM Donors</a>
            <a href="/#certificates">Certificates</a>
        </div>
        
        <!-- Help Text -->
        <p style="font-size: 14px; color: #999; margin-top: 24px;">
            <i class="fas fa-life-ring"></i> 
            Need help? Call us: <a href="tel:+8801612018221" style="color: #b71c1c; text-decoration: none; font-weight: 600;">+8801612018221</a>
        </p>
    </div>

    <!-- Lottie Library -->
    <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.14/dist/dotlottie-wc.js" type="module"></script>

    <script>
        // Search functionality
        function searchSite() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;
            
            // Redirect to find-donors page with search query
            window.location.href = '/#find-donors?search=' + encodeURIComponent(query);
        }
        
        // Enter key for search
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchSite();
            }
        });
        
        // Track 404 errors
        if (typeof firebase !== 'undefined' && firebase.analytics) {
            firebase.analytics().logEvent('page_not_found', {
                page: window.location.pathname,
                referrer: document.referrer
            });
        }
        
        console.log('🩸 404 Page - Blood Donor BD');
        console.log('🔍 Looking for something? Use the search box above!');
    </script>
</body>
</html>

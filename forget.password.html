<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password · Blood Donor BD</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .reset-card {
      background: white;
      max-width: 440px;
      width: 100%;
      padding: 40px 32px;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
      text-align: center;
      animation: fadeUp 0.4s ease;
    }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .reset-card .icon {
      font-size: 48px;
      color: #b71c1c;
      margin-bottom: 12px;
    }

    .reset-card h1 {
      font-size: 24px;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .reset-card p {
      color: #666;
      font-size: 14px;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      font-size: 14px;
      color: #333;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      font-size: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      transition: border-color 0.25s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #b71c1c;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: #b71c1c;
      color: white;
      font-weight: 700;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.25s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn:hover {
      background: #8b0000;
      transform: scale(1.02);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: #b71c1c;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    #messageBox {
      margin-top: 18px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
      text-align: left;
    }

    #messageBox.success {
      display: block;
      background: #e8f5e9;
      color: #1e5a2b;
      border-left: 4px solid #2e7d32;
    }

    #messageBox.error {
      display: block;
      background: #ffebee;
      color: #a12b2b;
      border-left: 4px solid #d32f2f;
      border-right: 4px solid #d32f2f;
    }

    #messageBox.info {
      display: block;
      background: #e3f2fd;
      color: #0d47a1;
      border-left: 4px solid #1565c0;
      border-right: 4px solid #1565c0;
    }

    .loader {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .footer-note {
      margin-top: 24px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>

<div class="reset-card">
  <div class="icon">
    <i class="fas fa-key"></i>
  </div>

  <h1>Reset Password</h1>
  <p>
    Enter the email address you used to register.<br />
    We'll check if it exists, then send a reset link.
  </p>

  <form id="resetForm">
    <div class="form-group">
      <label for="emailInput"><i class="fas fa-envelope"></i> Email Address</label>
      <input
        type="email"
        id="emailInput"
        placeholder="your@email.com"
        required
        autocomplete="email"
      />
    </div>

    <button type="submit" class="btn" id="submitBtn">
      <i class="fas fa-paper-plane"></i> Send Reset Link
    </button>
  </form>

  <div id="messageBox"></div>

  <a href="#" class="back-link" onclick="window.close(); return false;">
    <i class="fas fa-arrow-left"></i> Back to Login
  </a>

  <div class="footer-note">
    <i class="fas fa-shield-alt"></i> Secure &amp; encrypted
  </div>
</div>

<script>
  // ========== FIREBASE CONFIG ==========
  const firebaseConfig = {
    apiKey: "AIzaSyCnky8bzx3KuFoujU5DSlLRYSZgiAF8840",
    authDomain: "blood-donor-bd-2025.firebaseapp.com",
    projectId: "blood-donor-bd-2025",
    storageBucket: "blood-donor-bd-2025.firebasestorage.app",
    messagingSenderId: "271945142840",
    appId: "1:271945142840:web:b0edefddb55cac5f604ccd"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  // ========== DOM REFS ==========
  const form = document.getElementById('resetForm');
  const emailInput = document.getElementById('emailInput');
  const submitBtn = document.getElementById('submitBtn');
  const messageBox = document.getElementById('messageBox');

  // ========== HELPER: SHOW MESSAGE ==========
  function showMessage(text, type = 'info') {
    messageBox.textContent = text;
    messageBox.className = '';
    messageBox.classList.add(type);
    messageBox.style.display = 'block';
  }

  function hideMessage() {
    messageBox.style.display = 'none';
  }

  // ========== CHECK IF EMAIL EXISTS IN FIRESTORE ==========
  async function emailExistsInFirestore(email) {
    try {
      const snapshot = await db.collection('users')
        .where('email', '==', email)
        .limit(1)
        .get();

      return !snapshot.empty;
    } catch (error) {
      console.error('Firestore check error:', error);
      return false;
    }
  }

  // ========== FORM SUBMIT ==========
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideMessage();

    const email = emailInput.value.trim();

    if (!email) {
      showMessage('Please enter your email address.', 'error');
      return;
    }

    if (!email.includes('@') || !email.includes('.')) {
      showMessage('Please enter a valid email address.', 'error');
      return;
    }

    // Disable button & show loading
    submitBtn.disabled = true;
    submitBtn.innerHTML = `<span class="loader"></span> Checking...`;

    try {
      // STEP 1: Check if email exists in Firestore
      const exists = await emailExistsInFirestore(email);

      if (!exists) {
        showMessage(
          '❌ No account found with this email address.\nPlease register first.',
          'error'
        );
        submitBtn.disabled = false;
        submitBtn.innerHTML = `<i class="fas fa-paper-plane"></i> Send Reset Link`;
        return;
      }

      // STEP 2: Email exists → send password reset link
      submitBtn.innerHTML = `<span class="loader"></span> Sending...`;

      await auth.sendPasswordResetEmail(email);

      showMessage(
        `✅ Password reset link sent to ${email}.\n\nCheck your inbox (and spam folder) and follow the instructions.`,
        'success'
      );

      emailInput.value = '';

    } catch (error) {
      console.error('Password reset error:', error);

      let friendlyMessage = 'Something went wrong. Please try again.';

      switch (error.code) {
        case 'auth/invalid-email':
          friendlyMessage = 'Invalid email format. Please check and try again.';
          break;
        case 'auth/too-many-requests':
          friendlyMessage = 'Too many attempts. Please wait a few minutes and try again.';
          break;
        default:
          friendlyMessage = error.message || 'Failed to send reset email.';
      }

      showMessage(`❌ ${friendlyMessage}`, 'error');

    } finally {
      submitBtn.disabled = false;
      submitBtn.innerHTML = `<i class="fas fa-paper-plane"></i> Send Reset Link`;
    }
  });

  // ========== AUTO-FOCUS ==========
  window.addEventListener('load', () => {
    emailInput.focus();
  });
</script>

</body>
</html>

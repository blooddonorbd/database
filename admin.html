                                </div>

                                <label style="font-weight:600; display:block; margin-top:16px;">Blood Groups</label>
                                <div class="checkbox-group" id="emailBloodGroups">
                                    ${bloodGroups.map(b => `
                                        <label class="checkbox-label">
                                            <input type="checkbox" value="${b}" class="email-blood">
                                            ${b}
                                        </label>
                                    `).join('')}
                                </div>
                                <div style="display:flex; gap:8px; flex-wrap:wrap;">
                                    <button class="btn-secondary btn-sm" onclick="window._selectAllEmail('blood')">Select All</button>
                                    <button class="btn-secondary btn-sm" onclick="window._deselectAllEmail('blood')">Deselect</button>
                                </div>

                                <label style="font-weight:600; display:block; margin-top:16px;">User Type</label>
                                <select id="emailUserType" class="form-select">
                                    <option value="all">All Users</option>
                                    <option value="donor">Donors Only</option>
                                    <option value="seeker">Seekers Only</option>
                                    <option value="admin">Admins/Moderators</option>
                                </select>

                                <button class="btn-primary" onclick="window._previewRecipients()" style="margin-top:16px; width:100%;">
                                    <i class="fas fa-eye"></i> Preview Recipients
                                </button>
                                <div id="recipientPreview" style="margin-top:12px;"></div>
                            </div>

                            <div class="table-card" style="padding:24px;">
                                <h3 style="margin-bottom:16px;"><i class="fas fa-envelope"></i> Compose Email</h3>

                                <label style="font-weight:600;">Subject</label>
                                <input type="text" id="emailSubject" class="form-input" placeholder="Email subject...">

                                <label style="font-weight:600; margin-top:12px;">Body</label>
                                <textarea id="emailBody" class="form-textarea" style="min-height:200px;" placeholder="Write your email body here..."></textarea>

                                <p style="font-size:12px; color:var(--text-secondary); margin:12px 0;">
                                    <i class="fas fa-info-circle"></i> Opens your email client with all recipients in BCC.
                                </p>

                                <button class="btn-primary" onclick="window._sendBulkEmail()" style="width:100%;">
                                    <i class="fas fa-paper-plane"></i> Send Email
                                </button>
                            </div>
                        </div>
                    `;

                    // Store users for email
                    window._emailUsers = users;

                    window._selectAllEmail = (type) => {
                        const selector = type === 'districts' ? '.email-district' : '.email-blood';
                        document.querySelectorAll(selector).forEach(cb => cb.checked = true);
                    };

                    window._deselectAllEmail = (type) => {
                        const selector = type === 'districts' ? '.email-district' : '.email-blood';
                        document.querySelectorAll(selector).forEach(cb => cb.checked = false);
                    };

                    window._previewRecipients = () => {
                        const recipients = window._getEmailRecipients();
                        const preview = document.getElementById('recipientPreview');
                        if (recipients.length === 0) {
                            preview.innerHTML = '<p style="color:var(--text-secondary);">No recipients match your filters.</p>';
                            return;
                        }
                        preview.innerHTML = `
                            <div style="background:#f1f5f9; padding:12px; border-radius:10px;">
                                <strong>${recipients.length} recipients selected</strong>
                                ${recipients.length <= 20 ? `
                                    <div style="margin-top:8px; max-height:150px; overflow-y:auto; font-size:13px;">
                                        ${recipients.map(r => `<div>📧 ${r.email}${r.fullName ? ` (${r.fullName})` : ''}</div>`).join('')}
                                    </div>
                                ` : `<p style="font-size:13px; color:var(--text-secondary);">Too many to show individually.</p>`}
                            </div>
                        `;
                    };

                    window._getEmailRecipients = () => {
                        const selectedDistricts = [...document.querySelectorAll('.email-district:checked')].map(cb => cb
                        .value);
                        const selectedBlood = [...document.querySelectorAll('.email-blood:checked')].map(cb => cb.value);
                        const userType = document.getElementById('emailUserType')?.value || 'all';

                        return window._emailUsers.filter(u => {
                            if (selectedDistricts.length > 0 && !selectedDistricts.includes(u.district))
                            return false;
                            if (selectedBlood.length > 0 && !selectedBlood.includes(u.bloodGroup)) return false;

                            if (userType === 'donor' && !u.isDonor) return false;
                            if (userType === 'seeker' && u.isDonor) return false;
                            if (userType === 'admin' && !['admin', 'main_admin', 'moderator'].includes(u.role))
                                return false;

                            return u.email && u.email.includes('@');
                        });
                    };

                    window._sendBulkEmail = () => {
                        const recipients = window._getEmailRecipients();
                        if (recipients.length === 0) {
                            return showToast('No recipients selected', 'warning');
                        }

                        const subject = document.getElementById('emailSubject')?.value.trim() ||
                            'Message from Blood Donor BD';
                        const body = document.getElementById('emailBody')?.value.trim();

                        if (!body) {
                            return showToast('Please write an email body', 'warning');
                        }

                        const emails = recipients.map(r => r.email).join(',');
                        const mailto = `mailto:?bcc=${encodeURIComponent(emails)}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
                        window.open(mailto, '_blank');
                        showToast(`Opening email with ${recipients.length} recipients`, 'success');
                    };

                } catch (e) {
                    area.innerHTML = `<p style="color:var(--danger);">Error loading email composer: ${e.message}</p>`;
                }
            }

                        <div style="display:flex; gap:12px; margin-top:16px; flex-wrap:wrap;">
                            <button class="btn-secondary" id="bulkPreviewBtn"><i class="fas fa-eye"></i> Preview</button>
                            <button class="btn-primary" id="bulkRegisterBtn"><i class="fas fa-rocket"></i> Register All</button>
                            <button class="btn-secondary" id="bulkSampleBtn"><i class="fas fa-download"></i> Load Sample</button>
                            <button class="btn-secondary" id="bulkClearBtn"><i class="fas fa-eraser"></i> Clear</button>
                        </div>
                        <div id="bulkPreviewArea" style="margin-top:16px; display:none; overflow-x:auto;"></div>
                    </div>

                    <div class="table-card" style="padding:24px; margin-top:16px; display:none;" id="bulkProgressCard">
                        <h3><i class="fas fa-spinner fa-spin"></i> Progress</h3>
                        <div class="progress-bar-container">
                            <div class="progress-bar-fill" id="bulkProgressFill">0%</div>
                        </div>
                        <div style="display:flex; justify-content:space-between;">
                            <span id="bulkProgressText">Ready</span>
                            <span id="bulkProgressCount">0/0</span>
                        </div>
                    </div>

                    <div class="table-card" style="padding:24px; margin-top:16px;">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <h3><i class="fas fa-terminal"></i> Log</h3>
                            <button class="btn-secondary btn-sm" onclick="document.getElementById('bulkLog').innerHTML='';">Clear</button>
                        </div>
                        <div id="bulkLog" class="log-container">Ready...</div>
                    </div>
                `;

                initBulkRegister();
            }

            function initBulkRegister() {
                const dropZone = document.getElementById('bulkDropZone');
                const fileInput = document.getElementById('bulkFileInput');
                let uploadedData = null;

                function addLog(msg, type = 'info') {
                    const container = document.getElementById('bulkLog');
                    if (!container) return;
                    const div = document.createElement('div');
                    const classes = {
                        'success': 'log-success',
                        'error': 'log-error',
                        'highlight': 'log-highlight',
                        'info': 'log-info'
                    };
                    div.className = classes[type] || 'log-info';
                    div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
                    container.appendChild(div);
                    container.scrollTop = container.scrollHeight;
                }

                function getRows() {
                    const emails = document.getElementById('bulkEmailData').value.split('\n').map(l => l.trim()).filter(Boolean);
                    const names = document.getElementById('bulkNameData').value.split('\n').map(l => l.trim()).filter(Boolean);
                    const phones = document.getElementById('bulkPhoneData').value.split('\n').map(l => l.trim()).filter(Boolean);
                    const districts = document.getElementById('bulkDistrictData').value.split('\n').map(l => l.trim())
                        .filter(Boolean);
                    const upazilas = document.getElementById('bulkUpazilaData').value.split('\n').map(l => l.trim())
                        .filter(Boolean);
                    const bloods = document.getElementById('bulkBloodData').value.split('\n').map(l => l.trim()).filter(Boolean);

                    const maxLen = Math.max(emails.length, names.length, phones.length, districts.length, upazilas.length,
                        bloods.length);
                    const defDistrict = document.getElementById('bulkDefaultDistrict').value;
                    const defBlood = document.getElementById('bulkDefaultBlood').value;
                    const rows = [];

                    for (let i = 0; i < maxLen; i++) {
                        const email = emails[i] || '';
                        if (!email || !email.includes('@')) continue;
                        rows.push({
                            email,
                            password: generateRandomPassword(),
                            fullName: names[i] || email.split('@')[0],
                            phone: phones[i] || '',
                            district: districts[i] || defDistrict,
                            upazila: upazilas[i] || 'Sadar',
                            bloodGroup: bloods[i] || defBlood
                        });
                    }
                    return rows;
                }

                function updateStats() {
                    const rows = getRows();
                    document.getElementById('bulkTotal').textContent = rows.length;
                    document.getElementById('bulkSuccess').textContent = '0';
                    document.getElementById('bulkFailed').textContent = '0';
                    document.getElementById('bulkPending').textContent = rows.length;
                }

                function populateFromFile(data) {
                    const emails = [],
                        names = [],
                        phones = [],
                        districts = [],
                        upazilas = [],
                        bloods = [];
                    data.forEach(r => {
                        emails.push(r.email);
                        names.push(r.fullName);
                        phones.push(r.phone);
                        districts.push(r.district);
                        upazilas.push(r.upazila);
                        bloods.push(r.bloodGroup);
                    });
                    document.getElementById('bulkEmailData').value = emails.join('\n');
                    document.getElementById('bulkNameData').value = names.join('\n');
                    document.getElementById('bulkPhoneData').value = phones.join('\n');
                    document.getElementById('bulkDistrictData').value = districts.join('\n');
                    document.getElementById('bulkUpazilaData').value = upazilas.join('\n');
                    document.getElementById('bulkBloodData').value = bloods.join('\n');
                    updateStats();
                }

                if (dropZone) {
                    dropZone.addEventListener('click', () => fileInput.click());
                    dropZone.addEventListener('dragover', (e) => { e.preventDefault();
                        dropZone.style.borderColor = '#dc2626'; });
                    dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = '#cbd5e1'; });
                    dropZone.addEventListener('drop', (e) => {
                        e.preventDefault();
                        dropZone.style.borderColor = '#cbd5e1';
                        if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
                    });
                }

                if (fileInput) {
                    fileInput.addEventListener('change', (e) => {
                        if (e.target.files[0]) handleFile(e.target.files[0]);
                    });
                }

                function handleFile(file) {
                    document.getElementById('bulkFileInfo').textContent = `📄 ${file.name} (${(file.size/1024).toFixed(1)} KB)`;
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            if (file.name.endsWith('.csv')) {
                                const lines = e.target.result.split(/\r?\n/).filter(l => l.trim());
                                uploadedData = lines.slice(1).map(line => {
                                    const parts = line.split(',').map(s => s.trim());
                                    return {
                                        email: parts[0] || '',
                                        fullName: parts[1] || '',
                                        phone: parts[2] || '',
                                        district: parts[3] || '',
                                        upazila: parts[4] || '',
                                        bloodGroup: parts[5] || ''
                                    };
                                }).filter(r => r.email);
                            } else if (file.name.endsWith('.xlsx')) {
                                const workbook = XLSX.read(e.target.result, { type: 'binary' });
                                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                                const jsonData = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
                                uploadedData = jsonData.slice(1).map(row => ({
                                    email: (row[0] || '').toString().trim(),
                                    fullName: (row[1] || '').toString().trim(),
                                    phone: (row[2] || '').toString().trim(),
                                    district: (row[3] || '').toString().trim(),
                                    upazila: (row[4] || '').toString().trim(),
                                    bloodGroup: (row[5] || '').toString().trim()
                                })).filter(r => r.email);
                            }
                            addLog(`Loaded ${uploadedData.length} donors from file`, 'highlight');
                            populateFromFile(uploadedData);
                        } catch (err) {
                            addLog(`Error reading file: ${err.message}`, 'error');
                        }
                    };
                    if (file.name.endsWith('.xlsx')) {
                        reader.readAsArrayBuffer(file);
                    } else {
                        reader.readAsText(file);
                    }
                }

                document.getElementById('bulkClearFileBtn')?.addEventListener('click', () => {
                    uploadedData = null;
                    fileInput.value = '';
                    document.getElementById('bulkFileInfo').textContent = '';
                });

                document.getElementById('bulkPreviewBtn')?.addEventListener('click', () => {
                    const rows = getRows();
                    if (rows.length === 0) return showToast('No valid donors found', 'warning');

                    let html =
                        '<table class="table"><tr><th>#</th><th>Email</th><th>Password</th><th>Name</th><th>Phone</th><th>District</th><th>Blood</th></tr>';
                    rows.slice(0, 20).forEach((r, i) => {
                        html +=
                            `<tr><td>${i+1}</td><td>${r.email}</td><td>${r.password.substring(0,8)}...</td><td>${r.fullName}</td><td>${r.phone}</td><td>${r.district}</td><td><span class="blood-badge">${r.bloodGroup}</span></td></tr>`;
                    });
                    if (rows.length > 20) html +=
                        `<tr><td colspan="7" style="text-align:center;color:var(--text-secondary);">... and ${rows.length - 20} more</td></tr>`;
                    html += '</table>';
                    document.getElementById('bulkPreviewArea').innerHTML = html;
                    document.getElementById('bulkPreviewArea').style.display = 'block';
                });

                document.getElementById('bulkRegisterBtn')?.addEventListener('click', async () => {
                    const rows = getRows();
                    if (rows.length === 0) return showToast('No donors to register', 'warning');

                    const password = prompt(
                        "⚠️ Enter your admin password to continue.\nYour session will be preserved.",
                        ""
                    );
                    if (!password) return showToast('Operation cancelled', 'warning');

                    if (!confirm(`Register ${rows.length} donors?`)) return;

                    adminCredentials = { email: currentUser.email, password: password };

                    const progressCard = document.getElementById('bulkProgressCard');
                    const progressFill = document.getElementById('bulkProgressFill');
                    const progressText = document.getElementById('bulkProgressText');
                    const progressCount = document.getElementById('bulkProgressCount');

                    progressCard.style.display = 'block';
                    document.getElementById('bulkRegisterBtn').disabled = true;

                    let success = 0,
                        failed = 0;
                    let lastUser = null;

                    for (let i = 0; i < rows.length; i++) {
                        const r = rows[i];
                        const pct = Math.round((i / rows.length) * 100);
                        progressFill.style.width = `${pct}%`;
                        progressFill.textContent = `${pct}%`;
                        progressText.textContent = `Processing: ${r.fullName}`;
                        progressCount.textContent = `${i+1}/${rows.length}`;

                        try {
                            addLog(`⏳ Registering: ${r.email}`, 'info');
                            const coords = await getLatLng(r.district, r.upazila);
                            const userCred = await auth.createUserWithEmailAndPassword(r.email, r.password);
                            const uid = userCred.user.uid;
                            lastUser = userCred.user;
                            const unique = Math.random().toString(36).substring(2, 8).toUpperCase();

                            const donorData = {
                                address: "",
                                approvalStatus: "approved",
                                bloodGroup: r.bloodGroup,
                                certificates: [`BDC-${unique}`],
                                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                                district: r.district,
                                donorId: `DNR-${unique}`,
                                email: r.email,
                                fullName: r.fullName,
                                isDonor: true,
                                isSeeker: false,
                                isVerified: false,
                                lat: coords.lat,
                                lng: coords.lng,
                                nidNumber: "0",
                                phoneNumber: r.phone,
                                role: "user",
                                uid: uid,
                                upazila: r.upazila,
                                userType: "donor"
                            };

                            await db.collection('users').doc(uid).set(donorData);

                            await db.collection('certificates').doc(`BDC-${unique}`).set({
                                certificateId: `BDC-${unique}`,
                                userId: uid,
                                userName: r.fullName,
                                donorId: `DNR-${unique}`,
                                bloodGroup: r.bloodGroup,
                                issuedDate: new Date().toISOString(),
                                issuedBy: 'auto',
                                validUntil: new Date(Date.now() + 365 * 24 * 60 * 60 * 1000).toISOString()
                            });

                            success++;
                            document.getElementById('bulkSuccess').textContent = success;
                            addLog(`✅ Success: ${r.fullName}`, 'success');
                        } catch (err) {
                            failed++;
                            document.getElementById('bulkFailed').textContent = failed;
                            addLog(`❌ Failed ${r.email}: ${err.message}`, 'error');
                        }

                        document.getElementById('bulkPending').textContent = rows.length - i - 1;

                        if (i < rows.length - 1) {
                            await new Promise(resolve => setTimeout(resolve, 400));
                        }
                    }

                    progressFill.style.width = '100%';
                    progressFill.textContent = '100%';
                    progressText.textContent = 'Re-authenticating admin...';
                    progressCount.textContent = `${rows.length}/${rows.length}`;

                    try {
                        addLog('🔄 Re-authenticating as admin...', 'info');
                        if (lastUser) await auth.signOut();
                        await auth.signInWithEmailAndPassword(adminCredentials.email, adminCredentials.password);
                        adminCredentials = null;
                        addLog('✅ Successfully re-authenticated as admin', 'success');
                    } catch (err) {
                        addLog('⚠️ Re-authentication failed. Please log in manually.', 'error');
                        showToast('Re-authentication failed. Please log in again.', 'error');
                        setTimeout(() => auth.signOut().then(() => window.location.href = 'index.html'), 3000);
                    }

                    document.getElementById('bulkRegisterBtn').disabled = false;
                    addLog(`🎉 Done! ${success} success, ${failed} failed`, 'highlight');
                    showToast(`Registered ${success} donors!`, 'success');
                    refreshBadges();
                });

                document.getElementById('bulkSampleBtn')?.addEventListener('click', () => {
                    document.getElementById('bulkEmailData').value = 'rahim@example.com\nkarim@test.org';
                    document.getElementById('bulkNameData').value = 'Rahim Uddin\nKarim Mia';
                    document.getElementById('bulkPhoneData').value = '01711111111\n01722222222';
                    document.getElementById('bulkDistrictData').value = 'Dhaka\nMymensingh';
                    document.getElementById('bulkUpazilaData').value = 'Mirpur\nNandail';
                    document.getElementById('bulkBloodData').value = 'B+\nO+';
                    updateStats();
                    addLog('Sample data loaded', 'highlight');
                });

                document.getElementById('bulkClearBtn')?.addEventListener('click', () => {
                    ['bulkEmailData', 'bulkNameData', 'bulkPhoneData', 'bulkDistrictData', 'bulkUpazilaData',
                        'bulkBloodData'
                    ].forEach(id => document.getElementById(id).value = '');
                    document.getElementById('bulkPreviewArea').style.display = 'none';
                    updateStats();
                });

                ['bulkEmailData', 'bulkNameData', 'bulkPhoneData', 'bulkDistrictData', 'bulkUpazilaData',
                    'bulkBloodData'
                ].forEach(id => {
                    document.getElementById(id)?.addEventListener('input', updateStats);
                });

                updateStats();
            }

            // ============================================
            // ROLES MANAGEMENT
            // ============================================
            async function loadRoles() {
                if (!canManageRoles()) {
                    document.getElementById('contentArea').innerHTML =
                        '<p style="color:var(--danger);">Access denied. Only administrators can manage roles.</p>';
                    return;
                }

                const area = document.getElementById('contentArea');
                area.innerHTML = '<p><i class="fas fa-spinner fa-spin"></i> Loading roles...</p>';

                try {
                    const snap = await db.collection('users').where('role', 'in', ['main_admin', 'admin', 'moderator']).get();
                    const admins = snap.docs.map(d => ({ id: d.id, ...d.data() }));

                    let html = `
                        <div class="table-card">
                            <div class="card-header">
                                <h3><i class="fas fa-shield-alt"></i> Administrators & Moderators</h3>
                            </div>
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>User</th>
                                        <th>Email</th>
                                        <th>Phone</th>
                                        <th>Role</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                    `;

                    admins.forEach(a => {
                        const isProtected = SUPER_ADMINS.includes(a.email) || a.email === currentUser?.email;
                        html += `
                            <tr>
                                <td>${getRoleSymbol(a.role)} ${a.fullName || 'Unknown'}</td>
                                <td>${a.email}</td>
                                <td>${a.phoneNumber || 'N/A'}</td>
                                <td>${getRoleBadge(a.role)}</td>
                                <td>
                                    ${!isProtected && currentRole === 'main_admin' ? `
                                        <select class="form-select" style="padding:6px 12px; font-size:13px;" 
                                                onchange="window._changeRole('${a.id}', this.value)">
                                            <option value="">Change Role</option>
                                            <option value="user">👤 User</option>
                                            <option value="moderator">🔰 Moderator</option>
                                            <option value="admin">🛡️ Admin</option>
                                            <option value="main_admin">👑 Main Admin</option>
                                        </select>
                                    ` : !isProtected && currentRole === 'admin' && a.role !== 'main_admin' ? `
                                        <select class="form-select" style="padding:6px 12px; font-size:13px;" 
                                                onchange="window._changeRole('${a.id}', this.value)">
                                            <option value="">Change Role</option>
                                            <option value="user">👤 User</option>
                                            <option value="moderator">🔰 Moderator</option>
                                        </select>
                                    ` : '<span style="color:var(--text-secondary); font-size:12px;">Protected</span>'}
                                </td>
                            </tr>
                        `;
                    });

                    html += `
                                </tbody>
                            </table>
                        </div>

                        <div class="table-card" style="padding:24px; margin-top:16px;">
                            <h3><i class="fas fa-user-plus"></i> Appoint New Role</h3>
                            <p style="color:var(--text-secondary); font-size:13px; margin-bottom:16px;">
                                Assign a role to an existing user by email.
                            </p>
                            <div style="display:flex; gap:12px; flex-wrap:wrap;">
                                <input type="email" id="newRoleEmail" class="form-input" 
                                       placeholder="user@email.com" style="flex:1; min-width:200px;">
                                <select id="newRoleSelect" class="form-select">
                                    <option value="moderator">🔰 Moderator</option>
                                    <option value="admin">🛡️ Admin</option>
                                    ${currentRole === 'main_admin' ? `<option value="main_admin">👑 Main Admin</option>` : ''}
                                </select>
                                <button class="btn-primary" onclick="window._appointRole()">
                                    <i class="fas fa-plus"></i> Appoint
                                </button>
                            </div>
                        </div>
                    `;

                    area.innerHTML = html;

                    window._changeRole = async (userId, newRole) => {
                        if (!newRole) return;

                        if (currentRole === 'admin' && newRole === 'main_admin') {
                            return showToast('Only main admin can assign main admin', 'error');
                        }

                        try {
                            await db.collection('users').doc(userId).update({ role: newRole });
                            showToast(`Role updated to ${newRole}`, 'success');
                            loadRoles();
                        } catch (e) {
                            showToast('Error changing role: ' + e.message, 'error');
                        }
                    };

                    window._appointRole = async () => {
                        const email = document.getElementById('newRoleEmail')?.value.trim();
                        const role = document.getElementById('newRoleSelect')?.value;

                        if (!email) return showToast('Please enter an email', 'warning');

                        try {
                            const snap = await db.collection('users').where('email', '==', email).get();
                            if (snap.empty) return showToast('User not found', 'error');

                            const doc = snap.docs[0];
                            const data = doc.data();

                            if (SUPER_ADMINS.includes(data.email)) {
                                return showToast('Cannot modify super admin', 'error');
                            }

                            if (currentRole === 'admin' && role === 'main_admin') {
                                return showToast('Only main admin can appoint main admin', 'error');
                            }

                            await db.collection('users').doc(doc.id).update({ role: role });
                            showToast(`Appointed as ${getRoleDisplayName(role)}!`, 'success');
                            document.getElementById('newRoleEmail').value = '';
                            loadRoles();
                        } catch (e) {
                            showToast('Error appointing role: ' + e.message, 'error');
                        }
                    };

                } catch (e) {
                    area.innerHTML = `<p style="color:var(--danger);">Error loading roles: ${e.message}</p>`;
                }
            }

            // ============================================
            // HANDLE HASH CHANGE
            // ============================================
            window.addEventListener('hashchange', () => {
                const hash = window.location.hash.substring(1);
                const validTabs = ['dashboard', 'pending', 'users', 'donors', 'requests', 'contact-logs',
                    'certificates', 'bulk-email', 'bulk-register', 'roles'
                ];
                if (validTabs.includes(hash)) {
                    const navItem = document.querySelector(`[data-tab="${hash}"]`);
                    if (navItem) {
                        navItem.click();
                    }
                }
            });

            console.log('🩸 Blood Donor BD Admin Panel loaded successfully.');
            console.log('👑 Current Role:', currentRole);
            console.log('📋 Available permissions:', {
                canDelete: canDelete(),
                canManageRoles: canManageRoles(),
                canManageCertificates: canManageCertificates(),
                canBulkEmail: canBulkEmail(),
                canBulkRegister: canBulkRegister(),
                canViewContactLogs: canViewContactLogs(),
                canApprovePending: canApprovePending()
            });

        })();
    </script>
</body>
</html>

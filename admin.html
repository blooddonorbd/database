<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
  <title>Blood Donor BD · Admin Panel</title>
  <!-- Firebase & Libraries -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <!-- Fonts & Icons -->
  <link rel="icon" type="image/png" href="https://i.ibb.co/fd3zk65t/1000018685.jpg" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    /* ============================================
       ROOT VARIABLES
       ============================================ */
    :root {
      --primary: #dc2626;
      --primary-dark: #991b1b;
      --primary-light: #fecaca;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --bg: #f8fafc;
      --surface: #ffffff;
      --text: #0f172a;
      --text-secondary: #475569;
      --border: #e2e8f0;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
      --radius: 20px;
      --radius-sm: 14px;
      --sidebar-width: 280px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      height: 100vh;
      overflow: hidden;
    }

    .app-container {
      display: flex;
      height: 100vh;
      background: var(--bg);
    }

    /* ============================================
       SIDEBAR
       ============================================ */
    .sidebar {
      width: var(--sidebar-width);
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow);
      z-index: 20;
      transition: transform 0.3s ease;
      overflow-y: auto;
    }

    .sidebar-header {
      padding: 28px 20px 20px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      width: 56px;
      height: 56px;
      border-radius: 28px;
      margin-bottom: 8px;
      box-shadow: 0 8px 16px rgba(220, 38, 38, 0.2);
    }

    .sidebar-header h2 { font-size: 20px; font-weight: 700; }
    .sidebar-header p { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

    .nav-menu {
      flex: 1;
      padding: 16px 12px;
      overflow-y: auto;
      list-style: none;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      margin-bottom: 4px;
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-weight: 500;
      transition: all 0.2s;
      cursor: pointer;
      font-size: 15px;
    }

    .nav-item i { width: 24px; font-size: 18px; text-align: center; }

    .nav-item.active {
      background: var(--primary);
      color: white;
      box-shadow: 0 8px 16px rgba(220, 38, 38, 0.25);
    }

    .nav-item .badge {
      background: var(--danger);
      color: white;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 12px;
      margin-left: auto;
    }

    .nav-item .badge.green { background: var(--success); }
    .nav-item .badge.amber { background: var(--warning); }

    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .admin-profile {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding: 12px;
      background: #f1f5f9;
      border-radius: 16px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      background: var(--primary);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
    }

    .btn-logout {
      width: 100%;
      padding: 12px;
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 14px;
      color: var(--danger);
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-logout:hover { background: var(--danger); color: white; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 12px;
      color: var(--text-secondary);
      font-size: 13px;
      text-decoration: none;
    }

    /* ============================================
       MAIN CONTENT
       ============================================ */
    .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .top-bar {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .menu-toggle { display: none; background: none; border: none; font-size: 24px; cursor: pointer; }
    .page-title { font-size: 22px; font-weight: 700; }
    .content-scroll { flex: 1; overflow-y: auto; padding: 24px; }

    /* ============================================
       STATS CARDS
       ============================================ */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--surface);
      padding: 20px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .stat-icon {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: #fee2e2;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      font-size: 24px;
    }

    .stat-icon.green { background: #d1fae5; color: var(--success); }
    .stat-icon.amber { background: #fef3c7; color: var(--warning); }
    .stat-icon.purple { background: #ddd6fe; color: #7c3aed; }
    .stat-icon.blue { background: #dbeafe; color: #2563eb; }

    /* ============================================
       TABLES
       ============================================ */
    .table-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: auto;
      margin-bottom: 24px;
    }

    .table-card .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .table-card .card-header h3 { font-size: 16px; font-weight: 700; }

    .table { width: 100%; border-collapse: collapse; font-size: 14px; }

    .table th {
      background: #f8fafc;
      padding: 14px 16px;
      text-align: left;
      font-weight: 600;
      font-size: 13px;
      color: var(--text-secondary);
      position: sticky;
      top: 0;
      z-index: 2;
    }

    .table td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      vertical-align: middle;
    }

    .table tr:hover td { background: #fafcff; }

    .blood-badge {
      background: var(--primary);
      color: white;
      padding: 4px 12px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 13px;
      display: inline-block;
    }

    .status-badge {
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 600;
      color: white;
      display: inline-block;
    }

    .role-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 600;
      background: #f1f5f9;
    }

    .cert-badge { color: #7c3aed; margin-left: 5px; font-size: 14px; cursor: help; }

    /* ============================================
       BUTTONS
       ============================================ */
    .btn-icon {
      background: #f1f5f9;
      border: none;
      width: 34px;
      height: 34px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-right: 4px;
    }

    .btn-icon:hover { background: var(--primary); color: white; }
    .btn-icon.success:hover { background: var(--success); color: white; }
    .btn-icon.danger:hover { background: var(--danger); color: white; }

    .btn-primary {
      padding: 12px 24px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary:hover { background: var(--primary-dark); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-secondary {
      padding: 10px 20px;
      background: #f1f5f9;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-secondary:hover { background: #e2e8f0; }

    .btn-success {
      padding: 10px 20px;
      background: var(--success);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-success:hover { background: #059669; }

    .btn-danger {
      padding: 10px 20px;
      background: var(--danger);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-danger:hover { background: #dc2626; }
    .btn-danger:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-sm { padding: 6px 14px; font-size: 13px; }

    /* ============================================
       FORMS
       ============================================ */
    .form-input {
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      width: 100%;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: 0.2s;
    }

    .form-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1); }

    .form-select {
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      background: white;
      cursor: pointer;
    }

    .form-select:focus { outline: none; border-color: var(--primary); }

    .form-textarea {
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      width: 100%;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      resize: vertical;
      min-height: 100px;
      transition: 0.2s;
    }

    .form-textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1); }

    .checkbox-group { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      background: #f1f5f9;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      transition: 0.2s;
    }

    .checkbox-label:hover { background: #e2e8f0; }
    .checkbox-label input { margin: 0; cursor: pointer; }

    .upload-area {
      background: #f8fafc;
      border: 2px dashed #cbd5e1;
      border-radius: 12px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      margin-bottom: 16px;
      transition: 0.2s;
    }

    .upload-area:hover { border-color: var(--primary); background: #fff5f5; }

    .progress-bar-container {
      height: 24px;
      background: #e2e8f0;
      border-radius: 12px;
      overflow: hidden;
      margin: 16px 0;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--primary);
      width: 0%;
      transition: width 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 12px;
      font-weight: 600;
    }

    /* ============================================
       SEARCH & FILTERS
       ============================================ */
    .search-container {
      padding: 16px;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .search-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }

    .search-input {
      flex: 1;
      min-width: 200px;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: 0.2s;
    }

    .search-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1); }

    .search-select {
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      min-width: 150px;
      background: white;
      cursor: pointer;
    }

    .search-select:focus { outline: none; border-color: var(--primary); }

    .batch-actions { display: flex; gap: 10px; align-items: center; padding: 12px 0; flex-wrap: wrap; }
    .batch-actions.hidden { display: none; }
    .selected-count { font-size: 14px; color: var(--text-secondary); font-weight: 500; }

    .clear-search {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 8px;
      transition: 0.2s;
      font-weight: 500;
    }

    .clear-search:hover { background: #f1f5f9; color: var(--text); }
    .results-info { padding: 8px 0; color: var(--text-secondary); font-size: 13px; }

    .checkbox-wrapper { display: flex; align-items: center; justify-content: center; }
    .checkbox-wrapper input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--primary); }
    .select-all-checkbox { width: 18px; height: 18px; cursor: pointer; accent-color: var(--primary); }

    .search-icon { position: relative; display: inline-flex; align-items: center; flex: 1; min-width: 200px; }
    .search-icon i { position: absolute; left: 12px; color: var(--text-secondary); }
    .search-icon .search-input { padding-left: 35px; }

    /* ============================================
       GRID LAYOUTS
       ============================================ */
    .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
    .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; }
    .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }

    /* ============================================
       TOAST
       ============================================ */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      background: white;
      padding: 14px 20px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      display: flex;
      align-items: center;
      gap: 10px;
      animation: slideIn 0.3s ease;
      max-width: 450px;
    }

    .toast.success { border-left: 4px solid var(--success); }
    .toast.error { border-left: 4px solid var(--danger); }
    .toast.warning { border-left: 4px solid var(--warning); }
    .toast.info { border-left: 4px solid var(--primary); }

    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* ============================================
       MODAL
       ============================================ */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeIn 0.25s ease;
    }

    .modal-overlay .modal-box {
      background: white;
      border-radius: var(--radius);
      max-width: 600px;
      width: 100%;
      padding: 32px;
      box-shadow: var(--shadow);
      animation: scaleIn 0.25s ease;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-overlay .modal-box h2 { font-size: 20px; margin-bottom: 8px; }
    .modal-overlay .modal-box p.sub { color: var(--text-secondary); margin-bottom: 20px; }
    .modal-overlay .modal-box .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

    /* ============================================
       LOG CONTAINER
       ============================================ */
    .log-container {
      background: #0f172a;
      color: #cbd5e1;
      padding: 16px;
      border-radius: 12px;
      max-height: 300px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 13px;
      margin-top: 12px;
    }

    .log-container .log-success { color: #4ade80; }
    .log-container .log-error { color: #f87171; }
    .log-container .log-highlight { color: #facc15; }
    .log-container .log-info { color: #60a5fa; }

    /* ============================================
       RESPONSIVE
       ============================================ */
    @media (max-width: 768px) {
      .sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); width: 300px; z-index: 30; }
      .sidebar.open { transform: translateX(0); }
      .menu-toggle { display: block; }
      .top-bar { padding: 12px 16px; }
      .content-scroll { padding: 16px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
      .search-row { flex-direction: column; }
      .search-icon { min-width: 100%; }
      .search-input { min-width: 100%; }
      .search-select { min-width: 100%; }
    }

    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: 1fr; }
      .table { font-size: 12px; }
      .table th, .table td { padding: 10px 12px; }
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    .text-muted { color: var(--text-secondary); }
    .text-center { text-align: center; }
    .mt-1 { margin-top: 8px; } .mt-2 { margin-top: 16px; } .mt-3 { margin-top: 24px; }
    .mb-1 { margin-bottom: 8px; } .mb-2 { margin-bottom: 16px; }
    .flex { display: flex; } .flex-wrap { flex-wrap: wrap; } .items-center { align-items: center; }
    .gap-1 { gap: 8px; } .gap-2 { gap: 16px; } .w-full { width: 100%; } .hidden { display: none !important; }
  </style>
</head>
<body>
  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- User Details Modal -->
  <div id="userModal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
      <div style="display:flex; justify-content:space-between; align-items:start;">
        <h2><i class="fas fa-user"></i> User Details</h2>
        <button onclick="closeUserModal()" style="background:none; border:none; font-size:24px; cursor:pointer; color:var(--text-secondary);">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div id="userModalContent"></div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeUserModal()">Close</button>
      </div>
    </div>
  </div>

  <!-- App Container -->
  <div class="app-container" id="appContainer" style="display: none;">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <img src="https://i.ibb.co/S4NpN5F5/1000010374.png" alt="logo" class="logo" />
        <h2>Blood Donor BD</h2>
        <p>Administration Panel</p>
      </div>
      <ul class="nav-menu" id="navMenu">
        <li class="nav-item active" data-tab="dashboard"><i class="fas fa-chart-pie"></i> Dashboard</li>
        <li class="nav-item" data-tab="pending"><i class="fas fa-clock"></i> Pending <span class="badge" id="pendingBadge">0</span></li>
        <li class="nav-item" data-tab="users"><i class="fas fa-users"></i> All Users</li>
        <li class="nav-item" data-tab="donors"><i class="fas fa-heart"></i> Donors <span class="badge green" id="donorsBadge">0</span></li>
        <li class="nav-item" data-tab="requests"><i class="fas fa-bell"></i> Blood Requests <span class="badge amber" id="requestsBadge">0</span></li>
        <li class="nav-item" data-tab="contact-reveal-logs"><i class="fas fa-phone-alt"></i> Contact Reveals</li>
        <li class="nav-item" data-tab="certificates"><i class="fas fa-certificate"></i> Certificates</li>
        <li class="nav-item" data-tab="bulk-email" id="bulkEmailNav"><i class="fas fa-envelope"></i> Bulk Email</li>
        <!-- Modified Bulk Register nav item: now redirects externally -->

  </script>

  <script>
    (function() {
      const firebaseConfig = {
        apiKey: "AIzaSyCnky8bzx3KuFoujU5DSlLRYSZgiAF8840",
        authDomain: "blood-donor-bd-2025.firebaseapp.com",
        projectId: "blood-donor-bd-2025",
        storageBucket: "blood-donor-bd-2025.firebasestorage.app",
        messagingSenderId: "271945142840",
        appId: "1:271945142840:web:b0edefddb55cac5f604ccd"
      };
      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
      const db = firebase.firestore();

      const SUPER_ADMINS = ['blooddonorbd025@gmail.com', 'mdashfaqurrahmantanim@gmail.com'];
      let currentUser = null;
      let currentRole = 'user';
      let adminCredentials = null;
      let allUsersCache = [];
      let selectedUsers = new Set();
      let displayedUsers = [];

      function showToast(msg, type = 'info') {
        const container = document.getElementById('toastContainer');
        const el = document.createElement('div');
        el.className = `toast ${type}`;
        const iconMap = { success: 'check-circle', error: 'exclamation-circle', warning: 'triangle-exclamation', info: 'info-circle' };
        el.innerHTML = `<i class="fas fa-${iconMap[type] || 'info-circle'}" style="color:var(--${type === 'info' ? 'primary' : type})"></i> ${msg}`;
        container.appendChild(el);
        setTimeout(() => el.remove(), 4000);
      }

      function getRoleSymbol(role) {
        if (role === 'main_admin') return '👑'; if (role === 'admin') return '🛡️'; if (role === 'moderator') return '🔰'; return '👤';
      }
      function getRoleDisplayName(role) {
        if (role === 'main_admin') return '👑 Administrator'; if (role === 'admin') return '🛡️ Admin'; if (role === 'moderator') return '🔰 Moderator'; return '👤 User';
      }
      function getRoleBadge(role) {
        const map = { 'main_admin': '<span class="role-badge" style="background:#fef2f2;color:#b71c1c;">👑 Super Admin</span>', 'admin': '<span class="role-badge" style="background:#eff6ff;color:#2563eb;">🛡️ Admin</span>', 'moderator': '<span class="role-badge" style="background:#f5f3ff;color:#7c3aed;">🔰 Moderator</span>', 'user': '<span class="role-badge">👤 User</span>' };
        return map[role] || map.user;
      }
      function getStatusBadge(status) {
        const map = { 'approved': '<span class="status-badge" style="background:#10b981;"><i class="fas fa-check-circle"></i> Approved</span>', 'pending': '<span class="status-badge" style="background:#f59e0b;"><i class="fas fa-clock"></i> Pending</span>', 'rejected': '<span class="status-badge" style="background:#ef4444;"><i class="fas fa-times-circle"></i> Rejected</span>' };
        return map[status] || `<span class="status-badge" style="background:#64748b;">${status}</span>`;
      }
      function formatDate(date) { if (!date) return '—'; if (date.toDate) date = date.toDate(); return new Date(date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }); }
      function formatTime(date) { if (!date) return '—'; if (date.toDate) date = date.toDate(); return new Date(date).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }); }
      function generateCertificateId() { return 'BDC-' + Date.now().toString(36).toUpperCase() + '-' + Math.random().toString(36).substr(2, 5).toUpperCase(); }
      function generateDonorId() { return 'DNR-' + Date.now().toString(36).toUpperCase() + '-' + Math.random().toString(36).substr(2, 4).toUpperCase(); }
      function generateRandomPassword() {
        const words = ["red","donor","save","life","blood","hero","care","hope","plus","vital","brave","kind","pure","gift","beat","warm","gold","true","rise","safe"];
        const shuffled = [...words].sort(() => 0.5 - Math.random());
        return shuffled.slice(0, 5).join('-');
      }

      const geoDict = { "mymensingh": { lat: 24.7471, lng: 90.4203 }, "dhaka": { lat: 23.8103, lng: 90.4125 }, "kishoreganj": { lat: 24.4414, lng: 90.7766 }, "gazipur": { lat: 23.9999, lng: 90.4203 }, "chattogram": { lat: 22.3569, lng: 91.7832 }, "sylhet": { lat: 24.8949, lng: 91.8687 }, "rajshahi": { lat: 24.3745, lng: 88.6042 } };
      async function getLatLng(district, upazila) {
        const dKey = district.trim().toLowerCase();
        if (geoDict[dKey]) { const base = geoDict[dKey]; return { lat: parseFloat((base.lat + (Math.random() - 0.5) * 0.05).toFixed(4)), lng: parseFloat((base.lng + (Math.random() - 0.5) * 0.05).toFixed(4)) }; }
        return { lat: 23.8103, lng: 90.4125 };
      }

      function hasPermission(action) {
        if (currentRole === 'main_admin') return true;
        if (currentRole === 'admin') { const adminActions = ['view','manage_users','manage_donors','manage_requests','manage_certificates','manage_roles','bulk_email','bulk_register','view_logs','approve_users','manage_pending']; return adminActions.includes(action); }
        if (currentRole === 'moderator') { const modActions = ['view','manage_requests','view_users','approve_users','manage_pending']; return modActions.includes(action); }
        return false;
      }
      function canDelete() { return currentRole === 'main_admin' || currentRole === 'admin'; }
      function canManageRoles() { return currentRole === 'main_admin' || currentRole === 'admin'; }
      function canManageCertificates() { return currentRole === 'main_admin' || currentRole === 'admin'; }
      function canBulkEmail() { return currentRole === 'main_admin' || currentRole === 'admin'; }
      function canBulkRegister() { return currentRole === 'main_admin' || currentRole === 'admin'; }
      function canViewContactRevealLogs() { return currentRole === 'main_admin' || currentRole === 'admin'; }
      function canApprovePending() { return currentRole === 'main_admin' || currentRole === 'admin' || currentRole === 'moderator'; }

      async function autoIssueCertificate(userId, userData) {
        try {
          const existingSnap = await db.collection('certificates').where('userId', '==', userId).get();
          if (!existingSnap.empty) return false;
          const certificateId = generateCertificateId();
          const donorId = userData.donorId || generateDonorId();
          await db.collection('certificates').doc(certificateId).set({ certificateId, userId, userName: userData.fullName, donorId, bloodGroup: userData.bloodGroup, issuedDate: new Date().toISOString(), issuedBy: 'auto', validUntil: new Date(Date.now() + 365 * 24 * 60 * 60 * 1000).toISOString() });
          await db.collection('users').doc(userId).update({ donorId, certificates: firebase.firestore.FieldValue.arrayUnion(certificateId) });
          return true;
        } catch (e) { console.error('Auto-certificate error:', e); return false; }
      }

      async function refreshBadges() {
        try {
          const pendingSnap = await db.collection('users').where('approvalStatus', '==', 'pending').get();
          const donorsSnap = await db.collection('users').where('isDonor', '==', true).where('approvalStatus', '==', 'approved').get();
          const requestsSnap = await db.collection('bloodRequests').where('status', '==', 'active').get();
          document.getElementById('pendingBadge').textContent = pendingSnap.size;
          document.getElementById('donorsBadge').textContent = donorsSnap.size;
          document.getElementById('requestsBadge').textContent = requestsSnap.size;
          return { pending: pendingSnap.size, donors: donorsSnap.size, requests: requestsSnap.size };
        } catch (e) { console.error('Badge refresh error:', e); return { pending: 0, donors: 0, requests: 0 }; }
      }

      auth.onAuthStateChanged(async (user) => {
        if (!user) { window.location.href = 'index.html'; return; }
        try {
          const userDoc = await db.collection('users').doc(user.uid).get();
          if (!userDoc.exists) { showToast('User profile not found', 'error'); auth.signOut(); return; }
          const userData = userDoc.data();
          if (SUPER_ADMINS.includes(user.email)) currentRole = 'main_admin';
          else if (userData.role === 'admin' || userData.role === 'main_admin') currentRole = userData.role;
          else if (userData.role === 'moderator') currentRole = 'moderator';
          else { showToast('Access denied. Admin privileges required.', 'error'); auth.signOut(); return; }

          currentUser = { uid: user.uid, email: user.email, ...userData, role: currentRole };
          document.getElementById('adminAvatar').textContent = (userData.fullName || 'A').charAt(0);
          document.getElementById('adminName').innerHTML = `${getRoleSymbol(currentRole)} ${userData.fullName || 'Admin'}`;
          document.getElementById('adminEmail').textContent = user.email;
          document.getElementById('appContainer').style.display = 'flex';

          const bulkEmailNav = document.getElementById('bulkEmailNav');
          const bulkRegisterNav = document.getElementById('bulkRegisterNav');
          const rolesNav = document.getElementById('rolesNav');
          if (bulkEmailNav) bulkEmailNav.style.display = canBulkEmail() ? 'flex' : 'none';
          if (bulkRegisterNav) bulkRegisterNav.style.display = canBulkRegister() ? 'flex' : 'none';
          if (rolesNav) rolesNav.style.display = canManageRoles() ? 'flex' : 'none';

          await refreshBadges();
          setupNavigation();
          const hash = window.location.hash.substring(1);
          const validTabs = ['dashboard','pending','users','donors','requests','contact-reveal-logs','certificates','bulk-email','roles'];
          const defaultTab = validTabs.includes(hash) ? hash : 'dashboard';
          loadTab(defaultTab);

          const updateClock = () => { document.getElementById('currentDate').textContent = new Date().toLocaleString('en-GB', { dateStyle: 'medium', timeStyle: 'short' }); };
          updateClock();
          setInterval(updateClock, 1000);
        } catch (e) { showToast('Error loading profile: ' + e.message, 'error'); }
      });

      function setupNavigation() {
        document.getElementById('menuToggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));
        document.querySelectorAll('.nav-item[data-tab]').forEach(item => {
          item.addEventListener('click', (e) => {
            const tab = item.dataset.tab;
            if (!tab) return;
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            item.classList.add('active');
            const titleMap = { 'dashboard':'Dashboard','pending':'Pending Approvals','users':'All Users','donors':'Donors','requests':'Blood Requests','contact-reveal-logs':'Contact Reveals','certificates':'Certificates','bulk-email':'Bulk Email','roles':'Roles Management' };
            document.getElementById('pageTitle').textContent = titleMap[tab] || tab;
            loadTab(tab);
            if (window.innerWidth < 768) document.getElementById('sidebar').classList.remove('open');
            window.location.hash = tab;
          });
        });
        document.getElementById('logoutBtn').addEventListener('click', () => { adminCredentials = null; auth.signOut().then(() => window.location.href = 'index.html'); });
      }

      function loadTab(tab) {
        switch (tab) {
          case 'dashboard': loadDashboard(); break;
          case 'pending': loadPending(); break;
          case 'users': loadUsers(); break;
          case 'donors': loadDonors(); break;
          case 'requests': loadRequests(); break;
          case 'contact-reveal-logs': loadContactRevealLogs(); break;
          case 'certificates': loadCertificates(); break;
          case 'bulk-email': loadBulkEmail(); break;
          case 'roles': loadRoles(); break;
          default: document.getElementById('contentArea').innerHTML = '<p>Page not found.</p>';
        }
      }

      async function loadDashboard() {
        const area = document.getElementById('contentArea');
        area.innerHTML = '<p><i class="fas fa-spinner fa-spin"></i> Loading dashboard...</p>';
        try {
          const [usersSnap, donorsSnap, requestsSnap, certsSnap, logsSnap] = await Promise.all([
            db.collection('users').get(), db.collection('users').where('isDonor','==',true).where('approvalStatus','==','approved').get(),
            db.collection('bloodRequests').where('status','==','active').get(), db.collection('certificates').get(), db.collection('contactRevealLogs').get()
          ]);
          area.innerHTML = `
            <div class="stats-grid">
              <div class="stat-card"><div class="stat-icon"><i class="fas fa-users"></i></div><div><small>Total Users</small><h3>${usersSnap.size}</h3></div></div>
              <div class="stat-card"><div class="stat-icon green"><i class="fas fa-heart"></i></div><div><small>Active Donors</small><h3>${donorsSnap.size}</h3></div></div>
              <div class="stat-card"><div class="stat-icon amber"><i class="fas fa-bell"></i></div><div><small>Active Requests</small><h3>${requestsSnap.size}</h3></div></div>
              <div class="stat-card"><div class="stat-icon purple"><i class="fas fa-certificate"></i></div><div><small>Certificates</small><h3>${certsSnap.size}</h3></div></div>
              <div class="stat-card"><div class="stat-icon blue"><i class="fas fa-phone-alt"></i></div><div><small>Contact Reveals</small><h3>${logsSnap.size}</h3></div></div>
            </div>
            <div class="grid-2">
              <div class="table-card"><div class="card-header"><h3><i class="fas fa-clock"></i> Recent Contact Reveals</h3></div><div style="padding:16px;" id="dashboardRecentLogs">Loading...</div></div>
              <div class="table-card"><div class="card-header"><h3><i class="fas fa-chart-bar"></i> Quick Overview</h3></div><div style="padding:20px;"><p>Total Users: <strong>${usersSnap.size}</strong></p><p>Pending Approvals: <strong id="dashPendingCount">-</strong></p><p>Today's Reveals: <strong id="dashTodayReveals">-</strong></p></div></div>
            </div>
            <div class="table-card"><div class="card-header"><h3><i class="fas fa-tint"></i> Blood Group Distribution</h3></div><div style="padding:20px;"><canvas id="bloodGroupChart" height="250"></canvas></div></div>
          `;
          loadRecentLogs(); 
          const pendingCount = await refreshBadges(); 
          const dashPending = document.getElementById('dashPendingCount'); if(dashPending) dashPending.textContent = pendingCount.pending;
          loadTodayReveals(); loadBloodGroupChart();
        } catch (e) { area.innerHTML = `<p style="color:var(--danger);">Error loading dashboard: ${e.message}</p>`; }
      }

      async function loadRecentLogs() {
        const container = document.getElementById('dashboardRecentLogs'); if(!container) return;
        try {
          const snap = await db.collection('contactRevealLogs').orderBy('revealedAt', 'desc').limit(5).get();
          if(snap.empty) { container.innerHTML = '<p style="color:var(--text-secondary);">No contact reveals yet.</p>'; return; }
          container.innerHTML = snap.docs.map(d => { 
            const log = d.data(); 
            let time = log.revealedAt || log.timestamp;
            if (time?.toDate) time = time.toDate();
            else if (typeof time === 'string') time = new Date(time);
            else time = new Date();
            return `<div style="background:#f8fafc; padding:12px; border-radius:10px; margin-bottom:8px; border-left:4px solid var(--primary);"><strong>${log.seekerName || 'Unknown'}</strong> revealed <strong>${log.donorName || 'Unknown'}</strong>'s contact<br><small style="color:var(--text-secondary);">${time.toLocaleString('en-GB')}</small></div>`;
          }).join('');
        } catch (e) { container.innerHTML = '<p style="color:var(--text-secondary);">Error loading logs.</p>'; }
      }

      async function loadTodayReveals() { const el = document.getElementById('dashTodayReveals'); if(!el) return; try { const today = new Date(); today.setHours(0,0,0,0); const snap = await db.collection('contactRevealLogs').where('revealedAt','>=',today).get(); el.textContent = snap.size; } catch(e) { el.textContent = 'Error'; } }

      async function loadBloodGroupChart() {
        const canvas = document.getElementById('bloodGroupChart'); if(!canvas) return;
        try {
          const snap = await db.collection('users').where('isDonor','==',true).get();
          const groups = {}; snap.forEach(d => { const bg = d.data().bloodGroup; if(bg) groups[bg] = (groups[bg]||0)+1; });
          new Chart(canvas, { type:'bar', data:{ labels:Object.keys(groups), datasets:[{ label:'Donors', data:Object.values(groups), backgroundColor:'#dc2626', borderRadius:6 }] }, options:{ responsive:true, plugins:{ legend:{ display:false } }, scales:{ y:{ beginAtZero:true, ticks:{ stepSize:1 } } } } });
        } catch(e) { console.error('Chart error:', e); }
      }

      async function loadPending() {
        const area = document.getElementById('contentArea');
        area.innerHTML = '<p><i class="fas fa-spinner fa-spin"></i> Fetching pending requests...</p>';
        try {
          const snap = await db.collection('users').where('approvalStatus','==','pending').get();
          if(snap.empty) { area.innerHTML = `<div class="table-card" style="padding:40px; text-align:center;"><i class="fas fa-check-circle" style="font-size:48px; color:var(--success);"></i><h3 style="margin-top:16px;">No Pending Approvals</h3><p style="color:var(--text-secondary);">All donor applications have been reviewed.</p></div>`; return; }
          let html = `<div class="table-card"><div class="card-header"><h3><i class="fas fa-clock"></i> Pending Donor Applications (${snap.size})</h3></div><table class="table"><thead><tr><th>Name</th><th>Blood Group</th><th>Location</th><th>Phone</th><th>Actions</th></tr></thead><tbody>`;
          snap.docs.forEach(d => { const u = d.data(); html += `<tr><td><strong>${u.fullName || 'Unknown'}</strong></td><td><span class="blood-badge">${u.bloodGroup || 'N/A'}</span></td><td>${u.district || 'N/A'}, ${u.upazila || ''}</td><td>${u.phoneNumber || 'N/A'}</td><td>${canApprovePending() ? `<button class="btn-icon success" onclick="window._approveDonor('${d.id}')" title="Approve"><i class="fas fa-check"></i></button><button class="btn-icon danger" onclick="window._rejectDonor('${d.id}')" title="Reject"><i class="fas fa-times"></i></button>` : ''}<button class="btn-icon" onclick="window._viewUserDetails('${d.id}')" title="View Details"><i class="fas fa-eye"></i></button></td></tr>`; });
          html += `</tbody></table></div>`; area.innerHTML = html;
          window._approveDonor = async (id) => { if(!canApprovePending()) return showToast('You do not have permission to approve donors','error'); try { const userDoc = await db.collection('users').doc(id).get(); const userData = userDoc.data(); await db.collection('users').doc(id).update({ approvalStatus:'approved', isDonor:true, donorId: userData.donorId || generateDonorId(), approvedAt: firebase.firestore.FieldValue.serverTimestamp() }); const certIssued = await autoIssueCertificate(id, userData); showToast(certIssued ? 'Approved & Certificate Issued!' : 'Approved (Certificate already exists)','success'); refreshBadges(); loadPending(); } catch(e) { showToast('Error approving donor: '+e.message,'error'); } };
          window._rejectDonor = async (id) => { if(!canApprovePending()) return showToast('You do not have permission to reject donors','error'); if(!confirm('Reject this donor application?')) return; try { await db.collection('users').doc(id).update({ approvalStatus:'rejected', rejectedAt: firebase.firestore.FieldValue.serverTimestamp() }); showToast('Donor rejected','warning'); refreshBadges(); loadPending(); } catch(e) { showToast('Error rejecting donor: '+e.message,'error'); } };
          window._viewUserDetails = async (id) => { const doc = await db.collection('users').doc(id).get(); if(!doc.exists) return showToast('User not found','error'); const data = doc.data(); const modal = document.getElementById('userModal'); const content = document.getElementById('userModalContent'); content.innerHTML = `<div style="display:grid; gap:8px;"><p><strong>Name:</strong> ${data.fullName || 'N/A'}</p><p><strong>Email:</strong> ${data.email || 'N/A'}</p><p><strong>Phone:</strong> ${data.phoneNumber || 'N/A'}</p><p><strong>Blood Group:</strong> ${data.bloodGroup || 'N/A'}</p><p><strong>District:</strong> ${data.district || 'N/A'}</p><p><strong>Upazila:</strong> ${data.upazila || 'N/A'}</p><p><strong>Address:</strong> ${data.address || 'N/A'}</p><p><strong>Status:</strong> ${data.approvalStatus || 'N/A'}</p><p><strong>Role:</strong> ${getRoleDisplayName(data.role)}</p><p><strong>Donor ID:</strong> ${data.donorId || 'Not assigned'}</p><p><strong>Registered:</strong> ${formatDate(data.createdAt)}</p>${data.certificates && data.certificates.length > 0 ? `<p><strong>Certificates:</strong> ${data.certificates.length} certificate(s) issued</p>` : ''}</div>`; modal.style.display = 'flex'; };
        } catch(e) { area.innerHTML = `<p style="color:var(--danger);">Error loading pending: ${e.message}</p>`; }
      }

      async function loadUsers() {
        const area = document.getElementById('contentArea');
        area.innerHTML = '<p><i class="fas fa-spinner fa-spin"></i> Loading users...</p>';
        try {
          const snap = await db.collection('users').orderBy('createdAt','desc').get();
          allUsersCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          selectedUsers = new Set();
          const districts = [...new Set(allUsersCache.map(u => u.district).filter(Boolean))].sort();
          const bloodGroups = [...new Set(allUsersCache.map(u => u.bloodGroup).filter(Boolean))].sort();
          area.innerHTML = `
            <div class="search-container">
              <div class="search-row">
                <div class="search-icon"><i class="fas fa-search"></i><input type="text" id="userSearchInput" class="search-input" placeholder="Search by name, email, phone, donor ID..." oninput="window._filterUsers()"></div>
                <select id="bloodGroupFilter" class="search-select" onchange="window._filterUsers()"><option value="">All Blood Groups</option>${bloodGroups.map(bg => `<option value="${bg}">${bg}</option>`).join('')}</select>
                <select id="districtFilter" class="search-select" onchange="window._filterUsers()"><option value="">All Districts</option>${districts.map(d => `<option value="${d}">${d}</option>`).join('')}</select>
                <select id="roleFilter" class="search-select" onchange="window._filterUsers()"><option value="">All Roles</option><option value="main_admin">Super Admin</option><option value="admin">Admin</option><option value="moderator">Moderator</option><option value="user">User</option></select>
                <button class="clear-search" onclick="window._clearUserSearch()"><i class="fas fa-times"></i> Clear</button>
              </div>
              <div class="batch-actions hidden" id="batchActions"><span class="selected-count" id="selectedCount">0 selected</span>${canDelete() ? `<button class="btn-danger" id="batchDeleteBtn" disabled onclick="window._batchDeleteUsers()"><i class="fas fa-trash"></i> Delete Selected</button>` : ''}<button class="btn-secondary" onclick="window._clearSelection()"><i class="fas fa-times"></i> Clear Selection</button></div>
              <div class="results-info" id="resultsInfo"></div>
            </div>
            <div class="table-card"><table class="table" id="usersTable"><thead><tr><th style="width:50px;"><input type="checkbox" class="select-all-checkbox" id="selectAllCheckbox" onchange="window._toggleSelectAll()"></th><th>User Details</th><th>Type</th><th>Status</th><th>Role</th><th>Actions</th></tr></thead><tbody id="usersTableBody"></tbody></table></div>
          `;
          window._filterUsers();
          window._renderUsersTable(allUsersCache);
        } catch(e) { area.innerHTML = `<p style="color:var(--danger);">Error loading users: ${e.message}</p>`; }
      }

      window._filterUsers = function() {
        const searchTerm = document.getElementById('userSearchInput')?.value.toLowerCase().trim() || '';
        const bloodGroupFilter = document.getElementById('bloodGroupFilter')?.value || '';
        const districtFilter = document.getElementById('districtFilter')?.value || '';
        const roleFilter = document.getElementById('roleFilter')?.value || '';
        if(!allUsersCache) return;
        let filtered = allUsersCache.filter(u => {
          if(searchTerm) { const nameMatch = (u.fullName||'').toLowerCase().includes(searchTerm); const emailMatch = (u.email||'').toLowerCase().includes(searchTerm); const phoneMatch = (u.phoneNumber||'').toLowerCase().includes(searchTerm); const donorIdMatch = (u.donorId||'').toLowerCase().includes(searchTerm); if(!nameMatch && !emailMatch && !phoneMatch && !donorIdMatch) return false; }
          if(bloodGroupFilter && u.bloodGroup !== bloodGroupFilter) return false;
          if(districtFilter && u.district !== districtFilter) return false;
          if(roleFilter && u.role !== roleFilter) return false;
          return true;
        });
        displayedUsers = filtered;
        window._renderUsersTable(filtered);
      };

      window._renderUsersTable = function(users) {
        const tbody = document.getElementById('usersTableBody'); const resultsInfo = document.getElementById('resultsInfo');
        if(!tbody) return;
        if(users.length === 0) { if(resultsInfo) resultsInfo.innerHTML = '<i class="fas fa-info-circle"></i> No users found'; tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-secondary);">No users match your criteria</td></tr>`; return; }
        if(resultsInfo) resultsInfo.innerHTML = `<i class="fas fa-users"></i> Showing ${users.length} user${users.length !== 1 ? 's' : ''}`;
        const selectAll = document.getElementById('selectAllCheckbox');
        if(selectAll) { const allDisplayedSelected = users.length > 0 && users.every(u => selectedUsers.has(u.id)); selectAll.checked = allDisplayedSelected; selectAll.indeterminate = !allDisplayedSelected && users.some(u => selectedUsers.has(u.id)); }
        tbody.innerHTML = users.map(u => {
          const isSelected = selectedUsers.has(u.id); const isProtected = SUPER_ADMINS.includes(u.email) || u.email === currentUser?.email;
          return `<tr style="${isSelected ? 'background:#fef2f2;' : ''}" onclick="window._showUserDetails('${u.id}')"><td onclick="event.stopPropagation();"><div class="checkbox-wrapper"><input type="checkbox" class="user-checkbox" data-user-id="${u.id}" ${isSelected ? 'checked' : ''} ${isProtected ? 'disabled' : ''} onchange="window._toggleUserSelection('${u.id}', this.checked)"></div></td><td><strong>${getRoleSymbol(u.role || 'user')} ${u.fullName || 'Unknown'}</strong>${(u.certificates && u.certificates.length > 0) ? '<i class="fas fa-certificate cert-badge" title="Has Certificate"></i>' : ''}<br><small>${u.email || 'No email'}</small></td><td>${u.isDonor ? '🩸 Donor' : '🔍 Seeker'}</td><td>${getStatusBadge(u.approvalStatus)}</td><td>${getRoleBadge(u.role || 'user')}</td><td onclick="event.stopPropagation();">${canDelete() && !isProtected ? `<button class="btn-icon danger" onclick="window._deleteUser('${u.id}')" title="Delete User"><i class="fas fa-trash"></i></button>` : ''}<button class="btn-icon" onclick="window._showUserDetails('${u.id}')" title="View Details"><i class="fas fa-eye"></i></button></td></tr>`;
        }).join('');
        window._updateBatchActions();
      };

      window._toggleUserSelection = function(userId, isChecked) { if(isChecked) selectedUsers.add(userId); else selectedUsers.delete(userId); window._renderUsersTable(displayedUsers); window._updateBatchActions(); };
      window._toggleSelectAll = function() { const selectAll = document.getElementById('selectAllCheckbox'); const isChecked = selectAll.checked; displayedUsers.forEach(u => { const isProtected = SUPER_ADMINS.includes(u.email) || u.email === currentUser?.email; if(!isProtected) { if(isChecked) selectedUsers.add(u.id); else selectedUsers.delete(u.id); } }); window._renderUsersTable(displayedUsers); window._updateBatchActions(); };
      window._updateBatchActions = function() { const batchActions = document.getElementById('batchActions'); const selectedCount = document.getElementById('selectedCount'); const batchDeleteBtn = document.getElementById('batchDeleteBtn'); if(!batchActions || !selectedCount) return; const count = selectedUsers.size; if(count > 0) { batchActions.classList.remove('hidden'); selectedCount.textContent = `${count} user${count !== 1 ? 's' : ''} selected`; if(batchDeleteBtn) { batchDeleteBtn.disabled = false; batchDeleteBtn.innerHTML = `<i class="fas fa-trash"></i> Delete ${count} Selected`; } } else { batchActions.classList.add('hidden'); selectedCount.textContent = '0 selected'; if(batchDeleteBtn) { batchDeleteBtn.disabled = true; batchDeleteBtn.innerHTML = '<i class="fas fa-trash"></i> Delete Selected'; } } };
      window._clearSelection = function() { selectedUsers.clear(); window._renderUsersTable(displayedUsers); window._updateBatchActions(); };
      window._clearUserSearch = function() { ['userSearchInput','bloodGroupFilter','districtFilter','roleFilter'].forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; }); selectedUsers.clear(); window._filterUsers(); };
      window._showUserDetails = async function(userId) { try { const doc = await db.collection('users').doc(userId).get(); if(!doc.exists) return showToast('User not found','error'); const data = doc.data(); const modal = document.getElementById('userModal'); const content = document.getElementById('userModalContent'); content.innerHTML = `<div style="display:grid; gap:8px;"><p><strong>Full Name:</strong> ${data.fullName || 'N/A'}</p><p><strong>Email:</strong> ${data.email || 'N/A'}</p><p><strong>Phone:</strong> ${data.phoneNumber || 'N/A'}</p><p><strong>Blood Group:</strong> ${data.bloodGroup || 'N/A'}</p><p><strong>District:</strong> ${data.district || 'N/A'}</p><p><strong>Upazila:</strong> ${data.upazila || 'N/A'}</p><p><strong>Address:</strong> ${data.address || 'N/A'}</p><p><strong>Status:</strong> ${data.approvalStatus || 'N/A'}</p><p><strong>Role:</strong> ${getRoleDisplayName(data.role)}</p><p><strong>User Type:</strong> ${data.isDonor ? 'Blood Donor' : 'Donor Seeker'}</p><p><strong>Donor ID:</strong> ${data.donorId || 'Not assigned'}</p><p><strong>Registered:</strong> ${formatDate(data.createdAt)}</p>${data.certificates && data.certificates.length > 0 ? `<p><strong>Certificates:</strong> ${data.certificates.length} certificate(s) issued</p>` : ''}</div>`; modal.style.display = 'flex'; } catch(e) { showToast('Error loading user details: '+e.message,'error'); } };
      window._deleteUser = async function(userId) { if(!canDelete()) { showToast('You do not have permission to delete users','error'); return; } try { const doc = await db.collection('users').doc(userId).get(); if(!doc.exists) return showToast('User not found','error'); const data = doc.data(); if(SUPER_ADMINS.includes(data.email)) { showToast('Cannot delete super admin','error'); return; } if(data.email === currentUser?.email) { showToast('You cannot delete your own account','error'); return; } if(!confirm(`Are you sure you want to permanently delete user "${data.fullName || 'Unknown'}"?\n\nThis action cannot be undone.`)) return; await db.collection('users').doc(userId).delete(); selectedUsers.delete(userId); showToast('User deleted successfully','success'); refreshBadges(); loadUsers(); } catch(e) { showToast('Error deleting user: '+e.message,'error'); } };
      window._batchDeleteUsers = async function() { const ids = Array.from(selectedUsers); if(ids.length === 0) { showToast('No users selected','warning'); return; } const protectedUsers = []; for(const id of ids) { const doc = await db.collection('users').doc(id).get(); if(doc.exists) { const data = doc.data(); if(SUPER_ADMINS.includes(data.email) || data.email === currentUser?.email) protectedUsers.push(data.email); } } if(protectedUsers.length > 0) { showToast(`Cannot delete protected users: ${protectedUsers.join(', ')}`,'warning'); return; } if(!confirm(`⚠️ Are you sure you want to permanently delete ${ids.length} user${ids.length !== 1 ? 's' : ''}?\n\nThis action cannot be undone!`)) return; let success = 0, fail = 0; for(const id of ids) { try { await db.collection('users').doc(id).delete(); success++; } catch(e) { fail++; console.error('Delete error:', id, e); } } selectedUsers.clear(); showToast(`Deleted ${success} users${fail > 0 ? `, ${fail} failed` : ''}`, fail > 0 ? 'warning' : 'success'); refreshBadges(); loadUsers(); };

      async function loadDonors() {

          html += `</tbody></table></div>`; area.innerHTML = html;

      async function loadContactRevealLogs() {
        if(!canViewContactRevealLogs()) { 
          document.getElementById('contentArea').innerHTML = '<p style="color:var(--danger);">Access denied. Only administrators can view contact logs.</p>'; 
          return; 
        }
        const area = document.getElementById('contentArea'); 
        area.innerHTML = '<p><i class="fas fa-spinner fa-spin"></i> Loading contact logs...</p>';
        try {
          const snap = await db.collection('contactRevealLogs').orderBy('revealedAt', 'desc').limit(200).get();
          if(snap.empty) { 
            area.innerHTML = `<div class="table-card" style="padding:40px; text-align:center;">
              <i class="fas fa-phone-slash" style="font-size:48px; color:#ccc;"></i>
              <h3 style="margin-top:16px;">No Contact Reveals</h3>
              <p style="color:var(--text-secondary);">When users reveal contacts, they'll appear here.</p>
            </div>`; 
            return; 
          }
          
          let html = `<div class="table-card">
            <div class="card-header">
              <h3><i class="fas fa-phone-alt"></i> Contact Reveal Logs (${snap.size})</h3>
              ${canDelete() ? `<button class="btn-danger btn-sm" onclick="window._clearAllLogs()"><i class="fas fa-trash"></i> Clear All</button>` : ''}
            </div>
            <table class="table">
              <thead>
                <tr>
                  <th>Date/Time</th>
                  <th>Seeker</th>
                  <th>Donor</th>
                  <th>Donor ID</th>
                  <th>Seeker ID</th>
                  <th>Contact</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>`;
              
          snap.docs.forEach(d => { 
            const log = d.data(); 
            let time = log.revealedAt || log.timestamp;
            if (time?.toDate) time = time.toDate();
            else if (typeof time === 'string') time = new Date(time);
            else time = new Date();
            
            let contactDisplay = 'N/A';
            if (log.donorPhone) contactDisplay = log.donorPhone;
            else if (log.donorEmail) contactDisplay = log.donorEmail;
            else if (log.contactValue) contactDisplay = log.contactValue;
            
            let icon = '';
            const contactType = log.contactType || '';
            if (contactType.includes('phone') || contactType === 'phone_reval') icon = '📱 ';
            else if (contactType.includes('email')) icon = '📧 ';
            
            html += `<tr>
              <td><small>${time.toLocaleString('en-GB', {dateStyle:'medium', timeStyle:'short'})}</small></td>
              <td><strong>${log.seekerName || 'Unknown'}</strong></td>
              <td><strong>${log.donorName || 'Unknown'}</strong></td>
              <td><code>${log.donorId || 'N/A'}</code></td>
              <td><code>${log.seekerId || 'N/A'}</code></td>

                <span style="background:#f1f5f9; padding:4px 12px; border-radius:20px; font-family:monospace;">
                  ${icon}${contactDisplay}
                </span>
              </td>
              <td>${canDelete() ? `<button class="btn-icon danger" onclick="window._deleteLog('${d.id}')" title="Delete Log"><i class="fas fa-trash"></i></button>` : ''}
              </td>
            </tr>`; 
          });
          
          html += `</tbody></table></div>`;
          area.innerHTML = html;
          
          window._deleteLog = async (id) => { 
            if(!confirm('Delete this log entry?')) return; 
            try { 
              await db.collection('contactRevealLogs').doc(id).delete(); 
              showToast('Log deleted','success'); 
              loadContactRevealLogs(); 
            } catch(e) { 
              showToast('Error deleting log: '+e.message,'error'); 
            } 
          };
          
          window._clearAllLogs = async () => { 
            if(!confirm('⚠️ Delete ALL contact logs? This cannot be undone.')) return; 
            try { 
              const batch = db.batch(); 
              snap.docs.forEach(d => batch.delete(d.ref)); 
              await batch.commit(); 
              showToast('All logs cleared','success'); 
              loadContactRevealLogs(); 
            } catch(e) { 
              showToast('Error clearing logs: '+e.message,'error'); 
            } 
          };
        } catch(e) { 
          area.innerHTML = `<p style="color:var(--danger);">Error loading contact logs: ${e.message}</p>`; 
        }
      }

                <label style="font-weight:600;">Subject</label><input type="text" id="emailSubject" class="form-input" placeholder="Email subject...">
                <label style="font-weight:600; margin-top:12px;">Body</label><textarea id="emailBody" class="form-textarea" style="min-height:200px;" placeholder="Write your email body here..."></textarea>
                <p style="font-size:12px; color:var(--text-secondary); margin:12px 0;"><i class="fas fa-info-circle"></i> Opens your email client with all recipients in BCC.</p>
                <button class="btn-primary" onclick="window._sendBulkEmail()" style="width:100%;"><i class="fas fa-paper-plane"></i> Send Email</button>
              </div>
            </div>`;
          window._emailUsers = users;
          window._selectAllEmail = (type) => { document.querySelectorAll(type === 'districts' ? '.email-district' : '.email-blood').forEach(cb => cb.checked = true); };
          window._deselectAllEmail = (type) => { document.querySelectorAll(type === 'districts' ? '.email-district' : '.email-blood').forEach(cb => cb.checked = false); };
          window._previewRecipients = () => { const recipients = window._getEmailRecipients(); const preview = document.getElementById('recipientPreview'); if(recipients.length === 0) { preview.innerHTML = '<p style="color:var(--text-secondary);">No recipients match your filters.</p>'; return; } preview.innerHTML = `<div style="background:#f1f5f9; padding:12px; border-radius:10px;"><strong>${recipients.length} recipients selected</strong>${recipients.length <= 20 ? `<div style="margin-top:8px; max-height:150px; overflow-y:auto; font-size:13px;">${recipients.map(r => `<div>📧 ${r.email}${r.fullName ? ` (${r.fullName})` : ''}</div>`).join('')}</div>` : `<p style="font-size:13px; color:var(--text-secondary);">Too many to show individually.</p>`}</div>`; };
          window._getEmailRecipients = () => { const selectedDistricts = [...document.querySelectorAll('.email-district:checked')].map(cb => cb.value); const selectedBlood = [...document.querySelectorAll('.email-blood:checked')].map(cb => cb.value); const userType = document.getElementById('emailUserType')?.value || 'all'; return window._emailUsers.filter(u => { if(selectedDistricts.length > 0 && !selectedDistricts.includes(u.district)) return false; if(selectedBlood.length > 0 && !selectedBlood.includes(u.bloodGroup)) return false; if(userType === 'donor' && !u.isDonor) return false; if(userType === 'seeker' && u.isDonor) return false; if(userType === 'admin' && !['admin','main_admin','moderator'].includes(u.role)) return false; return u.email && u.email.includes('@'); }); };
          window._sendBulkEmail = () => { const recipients = window._getEmailRecipients(); if(recipients.length === 0) return showToast('No recipients selected','warning'); const subject = document.getElementById('emailSubject')?.value.trim() || 'Message from Blood Donor BD'; const body = document.getElementById('emailBody')?.value.trim(); if(!body) return showToast('Please write an email body','warning'); const emails = recipients.map(r => r.email).join(','); const mailto = `mailto:?bcc=${encodeURIComponent(emails)}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`; window.open(mailto, '_blank'); showToast(`Opening email with ${recipients.length} recipients`,'success'); };
        } catch(e) { area.innerHTML = `<p style="color:var(--danger);">Error loading email composer: ${e.message}</p>`; }
      }

      async function loadRoles() {
        if(!canManageRoles()) { document.getElementById('contentArea').innerHTML = '<p style="color:var(--danger);">Access denied. Only administrators can manage roles.</p>'; return; }
        const area = document.getElementById('contentArea'); area.innerHTML = '<p><i class="fas fa-spinner fa-spin"></i> Loading roles...</p>';
        try {
          const snap = await db.collection('users').where('role','in',['main_admin','admin','moderator']).get();
          const admins = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          let html = `<div class="table-card"><div class="card-header"><h3><i class="fas fa-shield-alt"></i> Administrators & Moderators</h3></div><table class="table"><thead><tr><th>User</th><th>Email</th><th>Phone</th><th>Role</th><th>Actions</th></tr></thead><tbody>`;
          admins.forEach(a => { const isProtected = SUPER_ADMINS.includes(a.email) || a.email === currentUser?.email; html += `<tr><td>${getRoleSymbol(a.role)} ${a.fullName || 'Unknown'}</td><td>${a.email}</td><td>${a.phoneNumber || 'N/A'}</td><td>${getRoleBadge(a.role)}</td><td>${!isProtected && currentRole === 'main_admin' ? `<select class="form-select" style="padding:6px 12px; font-size:13px;" onchange="window._changeRole('${a.id}', this.value)"><option value="">Change Role</option><option value="user">👤 User</option><option value="moderator">🔰 Moderator</option><option value="admin">🛡️ Admin</option><option value="main_admin">👑 Main Admin</option></select>` : !isProtected && currentRole === 'admin' && a.role !== 'main_admin' ? `<select class="form-select" style="padding:6px 12px; font-size:13px;" onchange="window._changeRole('${a.id}', this.value)"><option value="">Change Role</option><option value="user">👤 User</option><option value="moderator">🔰 Moderator</option></select>` : '<span style="color:var(--text-secondary); font-size:12px;">Protected</span>'}</td></tr>`; });
          html += `</tbody></table></div><div class="table-card" style="padding:24px; margin-top:16px;"><h3><i class="fas fa-user-plus"></i> Appoint New Role</h3><p style="color:var(--text-secondary); font-size:13px; margin-bottom:16px;">Assign a role to an existing user by email.</p><div style="display:flex; gap:12px; flex-wrap:wrap;"><input type="email" id="newRoleEmail" class="form-input" placeholder="user@email.com" style="flex:1; min-width:200px;"><select id="newRoleSelect" class="form-select"><option value="moderator">🔰 Moderator</option><option value="admin">🛡️ Admin</option>${currentRole === 'main_admin' ? `<option value="main_admin">👑 Main Admin</option>` : ''}</select><button class="btn-primary" onclick="window._appointRole()"><i class="fas fa-plus"></i> Appoint</button></div></div>`;
          area.innerHTML = html;
          window._changeRole = async (userId, newRole) => { if(!newRole) return; if(currentRole === 'admin' && newRole === 'main_admin') return showToast('Only main admin can assign main admin','error'); try { await db.collection('users').doc(userId).update({ role: newRole }); showToast(`Role updated to ${newRole}`,'success'); loadRoles(); } catch(e) { showToast('Error changing role: '+e.message,'error'); } };
          window._appointRole = async () => { const email = document.getElementById('newRoleEmail')?.value.trim(); const role = document.getElementById('newRoleSelect')?.value; if(!email) return showToast('Please enter an email','warning'); try { const snap = await db.collection('users').where('email','==',email).get(); if(snap.empty) return showToast('User not found','error'); const doc = snap.docs[0]; const data = doc.data(); if(SUPER_ADMINS.includes(data.email)) return showToast('Cannot modify super admin','error'); if(currentRole === 'admin' && role === 'main_admin') return showToast('Only main admin can appoint main admin','error'); await db.collection('users').doc(doc.id).update({ role: role }); showToast(`Appointed as ${getRoleDisplayName(role)}!`,'success'); document.getElementById('newRoleEmail').value = ''; loadRoles(); } catch(e) { showToast('Error appointing role: '+e.message,'error'); } };
        } catch(e) { area.innerHTML = `<p style="color:var(--danger);">Error loading roles: ${e.message}</p>`; }
      }

      window.addEventListener('hashchange', () => {
        const hash = window.location.hash.substring(1);
        const validTabs = ['dashboard','pending','users','donors','requests','contact-reveal-logs','certificates','bulk-email','roles'];
        if(validTabs.includes(hash)) { const navItem = document.querySelector(`[data-tab="${hash}"]`); if(navItem) navItem.click(); }
      });

      console.log('🩸 Blood Donor BD Admin Panel loaded – Bulk Register redirects externally.');
    })();
  </script>
</body>
</html>

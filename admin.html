<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Blood Donor BD · Admin Panel</title>
  <!-- Firebase & Libraries -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <!-- Fonts & Icons -->
  <link rel="icon" type="image/png" href="https://i.ibb.co/fd3zk65t/1000018685.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #dc2626; --primary-dark: #991b1b; --primary-light: #fecaca;
      --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
      --bg: #f8fafc; --surface: #ffffff; --text: #0f172a; --text-secondary: #475569;
      --border: #e2e8f0; --shadow: 0 4px 12px rgba(0,0,0,0.05);
      --radius: 20px; --radius-sm: 14px;
      --sidebar-width: 280px;
    }
    body {
      font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
      line-height: 1.5; -webkit-font-smoothing: antialiased; height: 100vh; overflow: hidden;
    }
    .app-container { display: flex; height: 100vh; background: var(--bg); }
    .sidebar {
      width: var(--sidebar-width); background: rgba(255,255,255,0.85);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-right: 1px solid var(--border); display: flex; flex-direction: column;
      box-shadow: var(--shadow); z-index: 20; transition: transform 0.3s ease;
    }
    .sidebar-header { padding: 28px 20px 20px; text-align: center; border-bottom: 1px solid var(--border); }
    .logo { width: 56px; height: 56px; border-radius: 28px; margin-bottom: 8px; box-shadow: 0 8px 16px rgba(220,38,38,0.2); }
    .sidebar-header h2 { font-size: 20px; font-weight: 700; }
    .sidebar-header p { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
    .nav-menu { flex: 1; padding: 16px 12px; overflow-y: auto; list-style: none; }
    .nav-item {
      display: flex; align-items: center; gap: 14px; padding: 14px 16px;
      margin-bottom: 4px; border-radius: var(--radius-sm); color: var(--text-secondary);
      font-weight: 500; transition: all 0.2s; cursor: pointer; font-size: 15px;
    }
    .nav-item i { width: 24px; font-size: 18px; text-align: center; }
    .nav-item.active { background: var(--primary); color: white; box-shadow: 0 8px 16px rgba(220,38,38,0.25); }
    .nav-item .badge { background: var(--danger); color: white; padding: 2px 10px; border-radius: 20px; font-size: 12px; margin-left: auto; }
    .sidebar-footer { padding: 16px; border-top: 1px solid var(--border); }
    .admin-profile { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding: 12px; background: #f1f5f9; border-radius: 16px; }
    .avatar { width: 40px; height: 40px; background: var(--primary); border-radius: 20px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; }
    .btn-logout {
      width: 100%; padding: 12px; background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2);
      border-radius: 14px; color: var(--danger); font-weight: 600; display: flex; align-items: center;
      justify-content: center; gap: 8px; cursor: pointer; transition: 0.2s;
    }
    .btn-logout:hover { background: var(--danger); color: white; }
    .back-link { display: block; text-align: center; margin-top: 12px; color: var(--text-secondary); font-size: 13px; text-decoration: none; }
    
    .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .top-bar {
      background: rgba(255,255,255,0.8); backdrop-filter: blur(12px); padding: 12px 24px;
      display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border);
    }
    .menu-toggle { display: none; background: none; border: none; font-size: 24px; cursor: pointer; }
    .page-title { font-size: 22px; font-weight: 700; }
    .content-scroll { flex: 1; overflow-y: auto; padding: 24px; }
    
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card {
      background: var(--surface); padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow);
      display: flex; align-items: center; gap: 16px;
    }
    .stat-icon { width: 52px; height: 52px; border-radius: 16px; background: #fee2e2; display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 24px; }
    .table-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); overflow: auto; margin-bottom: 24px; }
    .table { width: 100%; border-collapse: collapse; }
    .table th { background: #f8fafc; padding: 14px 16px; text-align: left; font-weight: 600; font-size: 13px; color: var(--text-secondary); position: sticky; top: 0; }
    .table td { padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 14px; }
    .blood-badge { background: var(--primary); color: white; padding: 4px 12px; border-radius: 30px; font-weight: 600; font-size: 13px; display: inline-block; }
    .status-badge { padding: 4px 12px; border-radius: 30px; font-size: 12px; font-weight: 600; color: white; display: inline-block; }
    .role-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: 30px; font-size: 12px; font-weight: 600; background: #f1f5f9; }
    .cert-badge { color: #7c3aed; margin-left: 5px; font-size: 14px; cursor: help; }
    .btn-icon { background: #f1f5f9; border: none; width: 34px; height: 34px; border-radius: 10px; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; margin-right: 4px; }
    .btn-icon:hover { background: var(--primary); color: white; }
    .btn-icon.success:hover { background: var(--success); color: white; }
    .btn-primary {
      padding: 12px 24px; background: var(--primary); color: white; border: none;
      border-radius: 12px; cursor: pointer; font-weight: 600; transition: 0.2s;
    }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      padding: 10px 20px; background: #f1f5f9; color: var(--text); border: 1px solid var(--border);
      border-radius: 12px; cursor: pointer; font-weight: 600; transition: 0.2s;
    }
    .btn-secondary:hover { background: #e2e8f0; }
    .form-input {
      padding: 12px; border-radius: 12px; border: 1px solid var(--border); width: 100%;
      font-size: 14px; margin-bottom: 10px;
    }
    .form-select {
      padding: 12px; border-radius: 12px; border: 1px solid var(--border); font-size: 14px;
    }
    .form-textarea {
      padding: 12px; border-radius: 12px; border: 1px solid var(--border); width: 100%;
      font-size: 14px; margin-bottom: 10px; resize: vertical; min-height: 100px;
    }
    
 
    
    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
    .toast { background: white; padding: 14px 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 10px; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    
    .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
    .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; }
    
    .checkbox-group { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
    .checkbox-label {
      display: flex; align-items: center; gap: 6px; padding: 8px 12px;
      background: #f1f5f9; border-radius: 20px; cursor: pointer; font-size: 13px;
    }
    .checkbox-label input { margin: 0; }
    
    .upload-area {
      background: #f8fafc; border: 2px dashed #cbd5e1; border-radius: 12px;
      padding: 30px; text-align: center; cursor: pointer; margin-bottom: 16px; transition: 0.2s;
    }
    .upload-area:hover { border-color: var(--primary); background: #fff5f5; }
    
    .progress-bar-container {
      height: 24px; background: #e2e8f0; border-radius: 12px; overflow: hidden; margin: 16px 0;
    }
    .progress-bar-fill {
      height: 100%; background: var(--primary); width: 0%;
      transition: width 0.3s; display: flex; align-items: center; justify-content: center;
      color: white; font-size: 12px; font-weight: 600;
    }
    
    @media (max-width: 768px) {
      .sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .menu-toggle { display: block; }
    }
  </style>
</head>
<body>
  <div class="toast-container" id="toastContainer"></div>
  
  <!-- User Details Modal -->
  <div id="userModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
    <div style="background:white; padding:24px; border-radius:20px; width:90%; max-width:500px; max-height:80vh; overflow-y:auto; position:relative;">
      <button onclick="document.getElementById('userModal').style.display='none'" style="position:absolute; top:10px; right:10px; border:none; background:none; cursor:pointer;"><i class="fas fa-times"></i></button>
      <h3>User Details</h3>
      <div id="userModalContent" style="margin-top:15px;"></div>
    </div>
  </div>
  
  <div class="app-container" id="appContainer" style="display: none;">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <img src="https://i.ibb.co/S4NpN5F5/1000010374.png" alt="logo" class="logo">
        <h2>Blood Donor BD</h2>
        <p>Administration</p>
      </div>
      <ul class="nav-menu" id="navMenu">
        <li class="nav-item active" data-tab="dashboard"><i class="fas fa-chart-pie"></i>Dashboard</li>
        <li class="nav-item" data-tab="pending"><i class="fas fa-clock"></i>Pending<span class="badge" id="pendingBadge">0</span></li>
        <li class="nav-item" data-tab="users"><i class="fas fa-users"></i>All Users</li>
        <li class="nav-item" data-tab="donors"><i class="fas fa-heart"></i>Donors</li>
        <li class="nav-item" data-tab="requests"><i class="fas fa-bell"></i>Blood Requests</li>
        <li class="nav-item" data-tab="contact-logs"><i class="fas fa-phone-alt"></i>Contact Reveals</li>
        <li class="nav-item" data-tab="certificates"><i class="fas fa-certificate"></i>Certificates</li>
        <li class="nav-item" data-tab="bulk-email"><i class="fas fa-envelope"></i>Bulk Email</li>
        <li class="nav-item" data-tab="bulk-register"><i class="fas fa-upload"></i>Bulk Register</li>
        <li class="nav-item" data-tab="roles"><i class="fas fa-shield-haltered"></i>Roles</li>
      </ul>
      <div class="sidebar-footer">
        <div class="admin-profile">
          <div class="avatar" id="adminAvatar">A</div>
          <div><strong id="adminName">Admin</strong><small id="adminEmail">admin@bd.com</small></div>
        </div>
        <button class="btn-logout" id="logoutBtn"><i class="fas fa-right-from-bracket"></i>Logout</button>
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to site</a>
      </div>
    </aside>
    
    <main class="main-content">
      <div class="top-bar">
        <div style="display: flex; align-items: center; gap: 12px;">
          <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
          <span class="page-title" id="pageTitle">Dashboard</span>
        </div>
        <span style="color: var(--text-secondary);" id="currentDate"></span>
      </div>
      <div class="content-scroll" id="contentArea"></div>
    </main>
  </div>

  <script>
    (function() {
      const firebaseConfig = {
        apiKey: "AIzaSyCnky8bzx3KuFoujU5DSlLRYSZgiAF8840",
        authDomain: "blood-donor-bd-2025.firebaseapp.com",
        projectId: "blood-donor-bd-2025",
        storageBucket: "blood-donor-bd-2025.firebasestorage.app",
        messagingSenderId: "271945142840",
        appId: "1:271945142840:web:b0edefddb55cac5f604ccd"
      };
      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
      const db = firebase.firestore();

      const SUPER_ADMINS = ['blooddonorbd025@gmail.com', 'mdashfaqurrahmantanim@gmail.com'];
      
      let currentUser = null;
      let currentRole = 'user';
      let adminCredentials = null; // Store admin credentials for re-authentication
      
      // Geo dictionary for bulk registration
      const geoDict = {
        "mymensingh": { lat:24.7471, lng:90.4203 },
        "dhaka": { lat:23.8103, lng:90.4125 },
        "kishoreganj": { lat:24.4414, lng:90.7766 },
        "gazipur": { lat:23.9999, lng:90.4203 },
        "chattogram": { lat:22.3569, lng:91.7832 },
        "sylhet": { lat:24.8949, lng:91.8687 },
        "rajshahi": { lat:24.3745, lng:88.6042 }
      };

      async function getLatLng(district, upazila) {
        const dKey = district.trim().toLowerCase();
        if (geoDict[dKey]) {
          const base = geoDict[dKey];
          return {
            lat: parseFloat((base.lat + (Math.random()-0.5)*0.05).toFixed(4)),
            lng: parseFloat((base.lng + (Math.random()-0.5)*0.05).toFixed(4))
          };
        }
        return { lat:23.8103, lng:90.4125 };
      }

      function generateRandomPassword() {
        const words = ["red", "donor", "save", "life", "blood", "hero", "care", "hope", "plus", "vital",
                       "brave", "kind", "pure", "gift", "beat", "warm", "gold", "true", "rise", "safe"];
        const shuffled = [...words].sort(()=>0.5-Math.random());
        return shuffled.slice(0,5).join('-');
      }

      function showToast(msg, type='info') {
        const container = document.getElementById('toastContainer');
        const el = document.createElement('div');
        el.className = `toast ${type}`;
        let icon = type==='success'?'check-circle':type==='error'?'exclamation-circle':'info-circle';
        el.innerHTML = `<i class="fas fa-${icon}" style="color:var(--${type === 'info' ? 'primary' : type})"></i> ${msg}`;
        container.appendChild(el);
        setTimeout(() => el.remove(), 4000);
      }

      function getRoleSymbol(role) {
        if (role === 'main_admin') return '👑';
        if (role === 'admin') return '🛡️';
        if (role === 'moderator') return '🔰';
        return '👤';
      }

      function getRoleDisplayName(role) {
        if (role === 'main_admin') return '👑 Administrator';
        if (role === 'admin') return '🛡️ Admin';
        if (role === 'moderator') return '🔰 Moderator';
        return '👤 User';
      }

      function updateRoleUI() {
        const rolesTab = document.querySelector('[data-tab="roles"]');
        const bulkEmailTab = document.querySelector('[data-tab="bulk-email"]');
        const bulkRegisterTab = document.querySelector('[data-tab="bulk-register"]');
        
        if (rolesTab) rolesTab.style.display = (currentRole === 'main_admin' || currentRole === 'admin') ? 'flex' : 'none';
        if (bulkEmailTab) bulkEmailTab.style.display = (currentRole === 'main_admin' || currentRole === 'admin') ? 'flex' : 'none';
        if (bulkRegisterTab) bulkRegisterTab.style.display = (currentRole === 'main_admin' || currentRole === 'admin') ? 'flex' : 'none';
      }

      function canManageRoles() { return currentRole === 'main_admin' || currentRole === 'admin'; }
      function canDelete() { return currentRole === 'main_admin' || currentRole === 'admin'; }
      function canManageCertificates() { return currentRole === 'main_admin' || currentRole === 'admin'; }
      function canViewContactLogs() { return currentRole === 'main_admin' || currentRole === 'admin'; }
      function canBulkEmail() { return currentRole === 'main_admin' || currentRole === 'admin'; }
      function canBulkRegister() { return currentRole === 'main_admin' || currentRole === 'admin'; }

      function generateCertificateId() {
        return 'BDC-' + Date.now().toString(36).toUpperCase() + '-' + Math.random().toString(36).substr(2, 5).toUpperCase();
      }

      function generateDonorId() {
        return 'DNR-' + Date.now().toString(36).toUpperCase() + '-' + Math.random().toString(36).substr(2, 4).toUpperCase();
      }

      async function refreshPendingCount() {
        try {
          const snap = await db.collection('users').where('approvalStatus','==','pending').get();
          const badge = document.getElementById('pendingBadge');
          if(badge) badge.textContent = snap.size;
          return snap.size;
        } catch(e) {
          console.error('Error refreshing pending count:', e);
          return 0;
        }
      }

      // Auto-issue certificate when donor is approved
      async function autoIssueCertificate(userId, userData) {
        try {
          const existingSnap = await db.collection('certificates')
            .where('userId', '==', userId)
            .get();
          
          if (!existingSnap.empty) return false; // Already has certificate
          
          const certificateId = generateCertificateId();
          const donorId = userData.donorId || generateDonorId();
          
          await db.collection('certificates').doc(certificateId).set({
            certificateId: certificateId,
            userId: userId,
            userName: userData.fullName,
            donorId: donorId,
            bloodGroup: userData.bloodGroup,
            issuedDate: new Date().toISOString(),
            issuedBy: 'auto',
            validUntil: new Date(Date.now() + 365 * 24 * 60 * 60 * 1000).toISOString()
          });
          
          await db.collection('users').doc(userId).update({
            donorId: donorId,
            certificates: firebase.firestore.FieldValue.arrayUnion(certificateId)
          });
          
          return true;
        } catch(e) {
          console.error('Auto-certificate error:', e);
          return false;
        }
      }

      auth.onAuthStateChanged(async (user) => {
        if (!user) { window.location.href = 'index.html'; return; }
        try {
          const userDoc = await db.collection('users').doc(user.uid).get();
          if (!userDoc.exists) { showToast('User profile not found', 'error'); auth.signOut(); return; }
          const userData = userDoc.data();
          
          if (SUPER_ADMINS.includes(user.email)) currentRole = 'main_admin';
          else if (userData.role === 'admin' || userData.role === 'main_admin') currentRole = userData.role;
          else if (userData.role === 'moderator') currentRole = 'moderator';
          else { showToast('Access denied', 'error'); auth.signOut(); return; }
          
          currentUser = { uid: user.uid, email: user.email, ...userData, role: currentRole };
          
          document.getElementById('adminAvatar').textContent = (userData.fullName || 'A').charAt(0);
          document.getElementById('adminName').innerHTML = `${getRoleSymbol(currentRole)} ${userData.fullName || 'Admin'}`;
          document.getElementById('adminEmail').textContent = user.email;
          document.getElementById('appContainer').style.display = 'flex';
          
          updateRoleUI();
          await refreshPendingCount();
          setupNavigation();
          loadTab('dashboard');
          
          // Update date immediately and then every second
          const updateDate = () => {
            document.getElementById('currentDate').textContent = new Date().toLocaleString('en-GB', {dateStyle:'medium', timeStyle:'short'});
          };
          updateDate();
          setInterval(updateDate, 1000);
        } catch (e) {
          showToast('Error: '+e.message, 'error');
        }
      });

      function setupNavigation() {
        document.getElementById('menuToggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));
        document.querySelectorAll('.nav-item').forEach(item => {
          item.addEventListener('click', (e) => {
            const tab = item.dataset.tab;
            if (!tab) return;
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            item.classList.add('active');
            document.getElementById('pageTitle').textContent = item.textContent.replace(/\d/g,'').trim();
            loadTab(tab);
            if (window.innerWidth < 768) document.getElementById('sidebar').classList.remove('open');
          });
        });
        document.getElementById('logoutBtn').addEventListener('click', () => {
          adminCredentials = null; // Clear stored credentials
          auth.signOut().then(() => window.location.href='index.html');
        });
      }

      function loadTab(tab) {
        const area = document.getElementById('contentArea');
        switch(tab) {
          case 'dashboard': loadDashboard(); break;
          case 'pending': loadPending(); break;
          case 'users': loadUsers(); break;
          case 'donors': loadDonors(); break;
          case 'requests': loadRequests(); break;
          case 'contact-logs': loadContactLogs(); break;
          case 'certificates': loadCertificates(); break;
          case 'bulk-email': loadBulkEmail(); break;
          case 'bulk-register': loadBulkRegister(); break;
          case 'roles': loadRolesManagement(); break;
        }
      }

      async function loadDashboard() {
        const area = document.getElementById('contentArea');
        area.innerHTML = '<p><i class="fas fa-spinner fa-spin"></i> Loading stats...</p>';
        
        try {
          const usersSnap = await db.collection('users').get();
          const donorsSnap = await db.collection('users').where('isDonor','==',true).where('approvalStatus','==','approved').get();
          const requestsSnap = await db.collection('bloodRequests').where('status','==','active').get();
          const certsSnap = await db.collection('certificates').get();
          const contactLogsSnap = await db.collection('contactLogs').get();
          
          area.innerHTML = `
            <div class="stats-grid">
              <div class="stat-card"><div class="stat-icon"><i class="fas fa-users"></i></div><div><small>Total Users</small><h3>${usersSnap.size}</h3></div></div>
              <div class="stat-card"><div class="stat-icon" style="background:#fecaca;"><i class="fas fa-heart"></i></div><div><small>Active Donors</small><h3>${donorsSnap.size}</h3></div></div>
              <div class="stat-card"><div class="stat-icon" style="background:#fef3c7; color:var(--warning)"><i class="fas fa-bell"></i></div><div><small>Active Requests</small><h3>${requestsSnap.size}</h3></div></div>
              <div class="stat-card"><div class="stat-icon" style="background:#ddd6fe; color:#7c3aed"><i class="fas fa-certificate"></i></div><div><small>Certificates</small><h3>${certsSnap.size}</h3></div></div>
              <div class="stat-card"><div class="stat-icon" style="background:#dbeafe; color:#2563eb"><i class="fas fa-phone-alt"></i></div><div><small>Contact Reveals</small><h3>${contactLogsSnap.size}</h3></div></div>
            </div>
            
            <div class="grid-2">
              <div class="table-card" style="padding:20px;">

window._filterUsers = function() {
  const searchTerm = document.getElementById('userSearchInput')?.value.toLowerCase().trim() || '';
  const bloodGroupFilter = document.getElementById('bloodGroupFilter')?.value || '';
  const districtFilter = document.getElementById('districtFilter')?.value || '';
  
  if (!window._allUsers) return;
  
  let filteredUsers = window._allUsers.filter(u => {
    // Search by name, email, phone
    if (searchTerm) {
      const nameMatch = (u.fullName || '').toLowerCase().includes(searchTerm);
      const emailMatch = (u.email || '').toLowerCase().includes(searchTerm);
      const phoneMatch = (u.phoneNumber || '').toLowerCase().includes(searchTerm);
      const donorIdMatch = (u.donorId || '').toLowerCase().includes(searchTerm);
      
      if (!nameMatch && !emailMatch && !phoneMatch && !donorIdMatch) {
        return false;
      }
    }
    
    // Filter by blood group
    if (bloodGroupFilter && u.bloodGroup !== bloodGroupFilter) {
      return false;
    }
    
    // Filter by district
    if (districtFilter && u.district !== districtFilter) {
      return false;
    }
    
    return true;
  });
  
  window._renderUsersTable(filteredUsers);
};

window._renderUsersTable = function(users) {
  const tbody = document.getElementById('usersTableBody');
  const resultsInfo = document.getElementById('resultsInfo');
  
  if (!tbody || !resultsInfo) return;
  
  // Update results info
  if (users.length === 0) {
    resultsInfo.innerHTML = '<i class="fas fa-info-circle"></i> No users found matching your criteria';
  } else {
    resultsInfo.innerHTML = `<i class="fas fa-users"></i> Showing ${users.length} user${users.length !== 1 ? 's' : ''}`;
  }
  
  // Store currently displayed users
  window._displayedUsers = users;
  window._displayedUserIds = new Set(users.map(u => u.id));
  
  // Update select all checkbox state
  const selectAllCheckbox = document.getElementById('selectAllCheckbox');
  if (selectAllCheckbox) {
    const allDisplayedSelected = users.length > 0 && users.every(u => window._selectedUsers.has(u.id));
    selectAllCheckbox.checked = allDisplayedSelected;
    selectAllCheckbox.indeterminate = !allDisplayedSelected && users.some(u => window._selectedUsers.has(u.id));
  }
  
  // Render table rows
  tbody.innerHTML = users.map(u => {
    const userId = u.id;
    if (!userId || userId.trim() === '') return '';
    
    const hasCert = u.certificates && u.certificates.length > 0;
    const bgStatus = u.approvalStatus === 'approved' ? 'var(--success)' : (u.approvalStatus === 'pending' ? 'var(--warning)' : 'var(--danger)');
    const userDataJson = JSON.stringify(u).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    const isSelected = window._selectedUsers.has(userId);
    
    return `
      <tr style="cursor:pointer; ${isSelected ? 'background: #fef2f2;' : ''}" onclick="window._showUserDetails('${userDataJson}')">
        <td style="width: 50px;" onclick="event.stopPropagation();">
          <div class="checkbox-wrapper">
            <input type="checkbox" 
                   class="user-checkbox" 
                   data-user-id="${userId}" 
                   ${isSelected ? 'checked' : ''} 
                   onchange="window._toggleUserSelection('${userId}', this.checked)"
                   ${(u.email === currentUser.email || SUPER_ADMINS.includes(u.email)) ? 'disabled' : ''}>
          </div>
        </td>
        <td>
          <strong>
            ${getRoleSymbol(u.role || 'user')} ${u.fullName || 'Unknown'}
            ${hasCert ? '<i class="fas fa-certificate cert-badge" title="Has Certificate"></i>' : ''}
          </strong><br><small>${u.email}</small>
        </td>
        <td>${u.isDonor ? '🩸 Donor' : '🔍 Seeker'}</td>
        <td><span class="status-badge" style="background:${bgStatus}">${u.approvalStatus || 'N/A'}</span></td>
        <td><span class="role-badge">${getRoleSymbol(u.role || 'user')} ${u.role || 'user'}</span></td>
        <td onclick="event.stopPropagation();">
          ${canDelete() ? (
            u.email === currentUser.email ? 
              '<span style="color:var(--text-secondary); font-size:12px;">You</span>' :
            SUPER_ADMINS.includes(u.email) ?
              '<span style="color:var(--text-secondary); font-size:12px;">Protected</span>' :
              `<button class="btn-icon" onclick="window._deleteUser('${userId}', '${(u.fullName || 'Unknown').replace(/'/g, "\\'")}')" title="Delete User"><i class="fas fa-trash" style="color:var(--danger)"></i></button>`
          ) : '<span style="color:var(--text-secondary); font-size:12px;">No permission</span>'}
        </td>
      </tr>
    `;
  }).join('');
  
  // Update batch actions visibility and count
  window._updateBatchActions();
};

window._toggleUserSelection = function(userId, isChecked) {
  if (!userId) return;
  
  if (isChecked) {
    window._selectedUsers.add(userId);
  } else {
    window._selectedUsers.delete(userId);
  }
  
  // Update select all checkbox
  const selectAllCheckbox = document.getElementById('selectAllCheckbox');
  if (selectAllCheckbox && window._displayedUsers) {
    const allDisplayedSelected = window._displayedUsers.every(u => window._selectedUsers.has(u.id));
    selectAllCheckbox.checked = allDisplayedSelected;
    selectAllCheckbox.indeterminate = !allDisplayedSelected && window._displayedUsers.some(u => window._selectedUsers.has(u.id));
  }
  
  // Update row background
  const row = document.querySelector(`input[data-user-id="${userId}"]`)?.closest('tr');
  if (row) {
    row.style.background = isChecked ? '#fef2f2' : '';
  }
  
  window._updateBatchActions();
};

window._toggleSelectAll = function() {
  const selectAllCheckbox = document.getElementById('selectAllCheckbox');
  const isChecked = selectAllCheckbox.checked;
  
  if (!window._displayedUsers) return;
  
  window._displayedUsers.forEach(u => {
    const userId = u.id;
    if (!userId) return;
    
    // Skip protected users
    if (u.email === currentUser.email || SUPER_ADMINS.includes(u.email)) return;
    
    if (isChecked) {
      window._selectedUsers.add(userId);
    } else {
      window._selectedUsers.delete(userId);
    }
  });
  
  // Re-render to update checkboxes and backgrounds
  window._renderUsersTable(window._displayedUsers);
};

window._updateBatchActions = function() {
  const batchActions = document.getElementById('batchActions');
  const selectedCount = document.getElementById('selectedCount');
  const batchDeleteBtn = document.getElementById('batchDeleteBtn');
  
  if (!batchActions || !selectedCount) return;
  
  const count = window._selectedUsers.size;
  
  if (count > 0) {
    batchActions.classList.remove('hidden');
    selectedCount.textContent = `${count} user${count !== 1 ? 's' : ''} selected`;
    if (batchDeleteBtn) {
      batchDeleteBtn.disabled = false;
      batchDeleteBtn.innerHTML = `<i class="fas fa-trash"></i> Delete ${count} Selected`;
    }
  } else {
    batchActions.classList.add('hidden');
    selectedCount.textContent = '0 selected';
    if (batchDeleteBtn) {
      batchDeleteBtn.disabled = true;
      batchDeleteBtn.innerHTML = '<i class="fas fa-trash"></i> Delete Selected';
    }
  }
};

window._clearSelection = function() {
  window._selectedUsers.clear();
  if (window._displayedUsers) {
    window._renderUsersTable(window._displayedUsers);
  }
};

window._clearUserSearch = function() {
  const searchInput = document.getElementById('userSearchInput');
  const bloodGroupFilter = document.getElementById('bloodGroupFilter');
  const districtFilter = document.getElementById('districtFilter');
  
  if (searchInput) searchInput.value = '';

window._batchDeleteUsers = async function() {
  const selectedIds = Array.from(window._selectedUsers);
  
  if (selectedIds.length === 0) {
    showToast('No users selected for deletion', 'warning');
    return;
  }
  
  // Filter out any invalid IDs
  const validIds = selectedIds.filter(id => id && id.trim() !== '');
  if (validIds.length === 0) {
    showToast('No valid users selected', 'warning');
    return;
  }
  
  // Check for protected users
  const protectedEmails = [];
  for (const userId of validIds) {
    const userDoc = await db.collection('users').doc(userId).get();
    if (userDoc.exists) {
      const userData = userDoc.data();
      if (SUPER_ADMINS.includes(userData.email) || userData.email === currentUser.email) {
        protectedEmails.push(userData.email);
      }
    }
  }
  
  if (protectedEmails.length > 0) {
    showToast(`Cannot delete protected users: ${protectedEmails.join(', ')}`, 'warning');
    return;
  }
  
  if (!confirm(`⚠️ Are you sure you want to permanently delete ${validIds.length} user${validIds.length !== 1 ? 's' : ''}?\n\nThis action cannot be undone!`)) {
    return;
  }
  
  // Second confirmation for bulk delete
  if (validIds.length > 1) {
    if (!confirm(`FINAL WARNING: You are about to delete ${validIds.length} users permanently.\n\nType DELETE to confirm:`)) {
      return;
    }
  }
  
  let successCount = 0;
  let failCount = 0;
  
  for (const userId of validIds) {
    try {
      const userDoc = await db.collection('users').doc(userId).get();
      if (!userDoc.exists) {
        failCount++;
        continue;
      }
      
      const userData = userDoc.data();
      
      // Delete associated certificates
      if (userData.certificates && userData.certificates.length > 0) {
        const batch = db.batch();
        for (const certId of userData.certificates) {
          if (certId) {
            batch.delete(db.collection('certificates').doc(certId));
          }
        }
        await batch.commit();
      }
      
      // Delete the user document
      await db.collection('users').doc(userId).delete();
      successCount++;
    } catch(e) {
      console.error('Error deleting user:', userId, e);
      failCount++;
    }
  }
  
  window._selectedUsers.clear();
  showToast(`Deleted ${successCount} users successfully${failCount > 0 ? `, ${failCount} failed` : ''}`, failCount > 0 ? 'warning' : 'success');
  refreshPendingCount();
  loadUsers();
};

// Enhanced delete user function (single delete)
window._deleteUser = async (userId, userName) => {
  if (!userId || typeof userId !== 'string' || userId.trim() === '') {
    showToast('Error: Invalid user ID. Cannot delete user.', 'error');
    console.error('Delete attempted with invalid userId:', userId);
    return;
  }
  
  if (!canDelete()) {
    showToast('You do not have permission to delete users', 'error');
    return;
  }
  
  if (userId === currentUser.uid) {
    showToast('You cannot delete your own account', 'error');
    return;
  }
  
  try {
    const userDoc = await db.collection('users').doc(userId).get();
    if (!userDoc.exists) {
      showToast('User not found in database', 'error');
      return;
    }
    
    const userData = userDoc.data();
    
    if (SUPER_ADMINS.includes(userData.email)) {
      showToast('Cannot delete super admin accounts', 'error');
      return;
    }
    
    if (confirm(`Are you sure you want to permanently delete user "${userName}"?\n\nThis action cannot be undone.`)) {
      try {
        // Delete associated certificates
        if (userData.certificates && userData.certificates.length > 0) {
          const batch = db.batch();
          for (const certId of userData.certificates) {
            if (certId) {
              batch.delete(db.collection('certificates').doc(certId));
            }
          }
          await batch.commit();
        }
        
        // Delete the user document
        await db.collection('users').doc(userId).delete();
        
        // Remove from selection if present
        window._selectedUsers?.delete(userId);
        
        showToast('User deleted successfully', 'success');
        refreshPendingCount();
        loadUsers();
      } catch(e) {
        showToast('Error deleting user: ' + e.message, 'error');
        console.error('Delete error:', e);
      }
    }
  } catch(e) {
    showToast('Error accessing user data: ' + e.message, 'error');
    console.error('Error in delete function:', e);
  }
};

            if (!certId || certId.trim() === '') {
              showToast('Error: Invalid certificate ID', 'error');
              return;
            }
            
            if (confirm('Are you sure you want to revoke this certificate? This will remove it from the donor as well.')) {
              try {
                const certDoc = await db.collection('certificates').doc(certId).get();
                if (certDoc.exists) {
                  const certData = certDoc.data();
                  // Remove certificate from user's array
                  if (certData.userId) {
                    await db.collection('users').doc(certData.userId).update({
                      certificates: firebase.firestore.FieldValue.arrayRemove(certId)
                    });

          showToast('Error: Invalid user ID', 'error');
          return;

        try {
          const userDoc = await db.collection('users').doc(userId).get();
          if (!userDoc.exists) { showToast('User not found', 'error'); return; }
          
          const userData = userDoc.data();
          const certIssued = await autoIssueCertificate(userId, userData);

      function initBulkRegister() {
        const dropZone = document.getElementById('bulkDropZone');
        const fileInput = document.getElementById('bulkFileInput');
        let uploadedData = null;
        
        function addBulkLog(msg, type='info') {
          const container = document.getElementById('bulkLogContainer');
          if (!container) return;
          const div = document.createElement('div');
          div.style.color = type === 'success' ? '#4ade80' : (type === 'error' ? '#f87171' : '#facc15');
          div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
          container.appendChild(div);
          container.scrollTop = container.scrollHeight;
        }
        
        function updateBulkStats() {
          const rows = getBulkRows();
          document.getElementById('bulkTotal').textContent = rows.length;
          document.getElementById('bulkSuccess').textContent = '0';
          document.getElementById('bulkFailed').textContent = '0';
          document.getElementById('bulkPending').textContent = rows.length;
        }
        
        function getBulkRows() {
          const emails = document.getElementById('bulkEmailData').value.split('\n').map(l=>l.trim()).filter(Boolean);
          const names = document.getElementById('bulkNameData').value.split('\n').map(l=>l.trim()).filter(Boolean);
          const phones = document.getElementById('bulkPhoneData').value.split('\n').map(l=>l.trim()).filter(Boolean);
          const districts = document.getElementById('bulkDistrictData').value.split('\n').map(l=>l.trim()).filter(Boolean);
          const upazilas = document.getElementById('bulkUpazilaData').value.split('\n').map(l=>l.trim()).filter(Boolean);
          const bloods = document.getElementById('bulkBloodData').value.split('\n').map(l=>l.trim()).filter(Boolean);
          
          const maxLen = Math.max(emails.length, names.length, phones.length, districts.length, upazilas.length, bloods.length);
          const defDistrict = document.getElementById('bulkDefaultDistrict').value;
          const defBlood = document.getElementById('bulkDefaultBlood').value;
          const rows = [];
          
          for (let i = 0; i < maxLen; i++) {
            const email = emails[i] || '';
            if (!email || !email.includes('@')) continue;
            rows.push({
              email,
              password: generateRandomPassword(),
              fullName: names[i] || email.split('@')[0],
              phone: phones[i] || '',
              district: districts[i] || defDistrict,
              upazila: upazilas[i] || 'Sadar',
              bloodGroup: bloods[i] || defBlood
            });
          }
          return rows;
        }
        
        function populateFromFileData(data) {
          const emails = [], names = [], phones = [], districts = [], upazilas = [], bloods = [];
          data.forEach(r => {
            emails.push(r.email);
            names.push(r.fullName);
            phones.push(r.phone);
            districts.push(r.district);
            upazilas.push(r.upazila);
            bloods.push(r.bloodGroup);
          });
          document.getElementById('bulkEmailData').value = emails.join('\n');
          document.getElementById('bulkNameData').value = names.join('\n');
          document.getElementById('bulkPhoneData').value = phones.join('\n');
          document.getElementById('bulkDistrictData').value = districts.join('\n');
          document.getElementById('bulkUpazilaData').value = upazilas.join('\n');
          document.getElementById('bulkBloodData').value = bloods.join('\n');
          updateBulkStats();
        }
        
        if (dropZone) {
          dropZone.addEventListener('click', () => fileInput.click());
          dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = '#dc2626'; });
          dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = '#cbd5e1'; });
          dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#cbd5e1';
            if (e.dataTransfer.files[0]) handleBulkFile(e.dataTransfer.files[0]);
          });
        }
        
        if (fileInput) {
          fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) handleBulkFile(e.target.files[0]);
          });
        }
        
        function handleBulkFile(file) {
          document.getElementById('bulkFileInfo').textContent = `📄 ${file.name} (${(file.size/1024).toFixed(1)} KB)`;
          const reader = new FileReader();
          reader.onload = (e) => {
            try {
              if (file.name.endsWith('.csv')) {
                const lines = e.target.result.split(/\r?\n/).filter(l => l.trim());
                uploadedData = lines.slice(1).map(line => {
                  const parts = line.split(',').map(s => s.trim());
                  return {
                    email: parts[0] || '',
                    fullName: parts[1] || '',
                    phone: parts[2] || '',
                    district: parts[3] || '',
                    upazila: parts[4] || '',
                    bloodGroup: parts[5] || ''
                  };
                }).filter(r => r.email);
              } else if (file.name.endsWith('.xlsx')) {
                const workbook = XLSX.read(e.target.result, {type:'binary'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(sheet, {header:1, defval:''});
                uploadedData = jsonData.slice(1).map(row => ({
                  email: (row[0] || '').toString().trim(),
                  fullName: (row[1] || '').toString().trim(),
                  phone: (row[2] || '').toString().trim(),
                  district: (row[3] || '').toString().trim(),
                  upazila: (row[4] || '').toString().trim(),
                  bloodGroup: (row[5] || '').toString().trim()
                })).filter(r => r.email);
              }
              addBulkLog(`File loaded: ${uploadedData.length} donors found`, 'highlight');
              populateFromFileData(uploadedData);
            } catch(err) {
              addBulkLog(`Error reading file: ${err.message}`, 'error');
            }
          };
          
          if (file.name.endsWith('.xlsx')) {
            reader.readAsArrayBuffer(file);
          } else {
            reader.readAsText(file);
          }
        }
        
        document.getElementById('bulkClearFileBtn')?.addEventListener('click', () => {
          uploadedData = null;
          fileInput.value = '';
          document.getElementById('bulkFileInfo').textContent = '';
        });
        
        document.getElementById('bulkPreviewBtn')?.addEventListener('click', () => {
          const rows = getBulkRows();
          if (rows.length === 0) { showToast('No valid donors found', 'warning'); return; }
          
          let html = '<table class="table"><tr><th>#</th><th>Email</th><th>Password</th><th>Name</th><th>Phone</th><th>District</th><th>Upazila</th><th>Blood</th></tr>';
          rows.forEach((r, i) => {
            html += `<tr><td>${i+1}</td><td>${r.email}</td><td>${r.password.substring(0,8)}...</td><td>${r.fullName}</td><td>${r.phone}</td><td>${r.district}</td><td>${r.upazila}</td><td><span class="blood-badge">${r.bloodGroup}</span></td></tr>`;
          });
          html += '</table>';
          document.getElementById('bulkPreviewArea').innerHTML = html;
          document.getElementById('bulkPreviewArea').style.display = 'block';
        });
        
        document.getElementById('bulkRegisterBtn')?.addEventListener('click', async () => {
          const rows = getBulkRows();
          if (rows.length === 0) { showToast('No donors to register', 'warning'); return; }
          
          // Ask for admin password to re-authenticate after bulk registration
          const adminPassword = prompt("⚠️ Bulk registration will create new accounts and may affect your session.\n\nPlease enter YOUR admin password to continue.\nYou will be automatically logged back in after completion:", "");
          if (!adminPassword) {
            showToast('Operation cancelled - admin password required', 'warning');
            return;
          }
          
          if (!confirm(`Register ${rows.length} donors?\n\nYour session will be preserved automatically.`)) return;
          
          // Store admin credentials for re-authentication
          adminCredentials = {
            email: currentUser.email,
            password: adminPassword
          };
          
          const progressCard = document.getElementById('bulkProgressCard');
          const progressFill = document.getElementById('bulkProgressFill');
          const progressText = document.getElementById('bulkProgressText');
          const progressCount = document.getElementById('bulkProgressCount');
          
          progressCard.style.display = 'block';
          document.getElementById('bulkRegisterBtn').disabled = true;
          
          let success = 0, failed = 0;
          let lastCreatedUser = null;
          
          for (let i = 0; i < rows.length; i++) {
            const r = rows[i];
            progressFill.style.width = `${Math.round((i/rows.length)*100)}%`;
            progressFill.textContent = `${Math.round((i/rows.length)*100)}%`;
            progressText.textContent = `Processing: ${r.fullName}`;
            progressCount.textContent = `${i+1}/${rows.length}`;
            
            try {
              addBulkLog(`⏳ Registering: ${r.email}`, 'info');
              const coords = await getLatLng(r.district, r.upazila);
              const userCred = await auth.createUserWithEmailAndPassword(r.email, r.password);
              const uid = userCred.user.uid;
              lastCreatedUser = userCred.user;
              const unique = Math.random().toString(36).substring(2,8).toUpperCase();
              
              const donorData = {
                address: "",
                approvalStatus: "approved",
                bloodGroup: r.bloodGroup,
                certificates: [`BDC-${unique}`],
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                district: r.district,
                donorId: `DNR-${unique}`,
                email: r.email,
                fullName: r.fullName,
                isDonor: true,
                isSeeker: false,
                isVerified: false,
                lat: coords.lat,
                lng: coords.lng,
                nidNumber: "0",
                phoneNumber: r.phone,
                role: "user",
                uid: uid,
                upazila: r.upazila,
                userType: "donor"
              };
              
              await db.collection('users').doc(uid).set(donorData);
              
              // Auto-issue certificate
              await db.collection('certificates').doc(`BDC-${unique}`).set({
                certificateId: `BDC-${unique}`,
                userId: uid,
                userName: r.fullName,
                donorId: `DNR-${unique}`,
                bloodGroup: r.bloodGroup,
                issuedDate: new Date().toISOString(),
                issuedBy: 'auto',
                validUntil: new Date(Date.now() + 365 * 24 * 60 * 60 * 1000).toISOString()
              });
              
              success++;
              document.getElementById('bulkSuccess').textContent = success;
              addBulkLog(`✅ Success: ${r.fullName}`, 'success');
            } catch(err) {
              failed++;
              document.getElementById('bulkFailed').textContent = failed;
              addBulkLog(`❌ Failed ${r.email}: ${err.message}`, 'error');
            }
            
            document.getElementById('bulkPending').textContent = rows.length - i - 1;
            
            if (i < rows.length - 1) {
              await new Promise(resolve => setTimeout(resolve, 500));
            }
          }
          
          progressFill.style.width = '100%';
          progressFill.textContent = '100%';
          progressText.textContent = 'Re-authenticating admin...';
          progressCount.textContent = `${rows.length}/${rows.length}`;
          
          // Re-authenticate as admin
          try {
            addBulkLog('🔄 Re-authenticating as admin...', 'info');
            if (lastCreatedUser) {
              await auth.signOut();
            }
            await auth.signInWithEmailAndPassword(adminCredentials.email, adminCredentials.password);
            adminCredentials = null; // Clear stored credentials
            addBulkLog('✅ Successfully re-authenticated as admin', 'success');
          } catch(err) {
            addBulkLog('⚠️ Failed to re-authenticate. Please log in manually.', 'error');
            showToast('Registration complete but re-authentication failed. Please log in again.', 'error');
            setTimeout(() => {
              auth.signOut().then(() => window.location.href = 'index.html');
            }, 3000);
          }
          
          document.getElementById('bulkRegisterBtn').disabled = false;
          addBulkLog(`🎉 Done! ${success} success, ${failed} failed`, 'highlight');
          showToast(`Registered ${success} donors successfully!`, 'success');
          refreshPendingCount();
        });
        
        document.getElementById('bulkSampleBtn')?.addEventListener('click', () => {
          document.getElementById('bulkEmailData').value = 'rahim@example.com\nkarim@test.org';
          document.getElementById('bulkNameData').value = 'Rahim Uddin\nKarim Mia';
          document.getElementById('bulkPhoneData').value = '01711111111\n01722222222';
          document.getElementById('bulkDistrictData').value = 'Dhaka\nMymensingh';
          document.getElementById('bulkUpazilaData').value = 'Mirpur\nNandail';
          document.getElementById('bulkBloodData').value = 'B+\nO+';
          updateBulkStats();
          addBulkLog('Sample data loaded');
        });
        
        document.getElementById('bulkClearBtn')?.addEventListener('click', () => {
          ['bulkEmailData','bulkNameData','bulkPhoneData','bulkDistrictData','bulkUpazilaData','bulkBloodData'].forEach(id => {
            document.getElementById(id).value = '';
          });
          document.getElementById('bulkPreviewArea').style.display = 'none';
          updateBulkStats();
        });
        
        // Listen for changes in textareas
        ['bulkEmailData','bulkNameData','bulkPhoneData','bulkDistrictData','bulkUpazilaData','bulkBloodData'].forEach(id => {
          document.getElementById(id)?.addEventListener('input', updateBulkStats);
        });
      }

      // ==================== ROLES TAB ====================
      async function loadRolesManagement() {
        if (!canManageRoles()) { document.getElementById('contentArea').innerHTML = '<p>Access denied.</p>'; return; }
        const area = document.getElementById('contentArea');
        area.innerHTML = '<p><i class="fas fa-spinner fa-spin"></i> Loading administrators...</p>';
        
        try {
          const snap = await db.collection('users').where('role', 'in', ['main_admin','admin','moderator']).get();
          const admins = snap.docs.map(d => ({id: d.id, ...d.data()}));
          
          let html = `<div class="table-card"><h3 style="padding:16px;">👑 Administrators & Moderators</h3>
          <table class="table"><tr><th>User</th><th>Email</th><th>Phone</th><th>Role</th><th>Action</th></tr>`;
          admins.forEach(a => {
            const symbol = getRoleSymbol(a.role);
            html += `<tr><td>${a.fullName || 'N/A'}</td><td>${a.email}</td><td>📱 ${a.phoneNumber || 'N/A'}</td>
              <td><span class="role-badge">${symbol} ${getRoleDisplayName(a.role)}</span></td>
              <td>`;
            if (currentRole === 'main_admin' && !SUPER_ADMINS.includes(a.email)) {
              html += `<select onchange="window._changeRole('${a.id}', this.value)" class="form-select">
                <option value="">Change Role</option>
                <option value="user">👤 User (Demote)</option>
                <option value="main_admin">👑 Main Admin</option>
                <option value="admin">🛡️ Admin</option>
                <option value="moderator">🔰 Moderator</option>
              </select>`;
            } else if (currentRole === 'admin' && a.role !== 'main_admin' && !SUPER_ADMINS.includes(a.email)) {
              html += `<select onchange="window._changeRole('${a.id}', this.value)" class="form-select">
                <option value="">Change Role</option>
                <option value="user">👤 User (Demote)</option>
                <option value="moderator">🔰 Moderator</option>
              </select>`;
            } else {
              html += `<span style="color:var(--text-secondary); font-size:12px;">Protected</span>`;
            }
            html += `</td></tr>`;
          });
          html += `</table></div>
          <div style="margin-top:20px; background:white; padding:20px; border-radius:20px; box-shadow:var(--shadow)">
            <h4>➕ Appoint New Role</h4>
            <input id="newAdminEmail" placeholder="user@email.com" class="form-input">
            <select id="newRoleSelect" class="form-select" style="margin-bottom:10px;">
              <option value="admin">🛡️ Admin</option>
              <option value="moderator">🔰 Moderator</option>
            </select>
            <button onclick="window._appointRole()" class="btn-primary" style="width:100%">Appoint</button>
          </div>`;
          area.innerHTML = html;
        } catch(e) {
          area.innerHTML = `<p style="color:var(--danger);">Error loading roles: ${e.message}</p>`;
        }
      }

      window._changeRole = async (userId, newRole) => {
        if (!newRole) return;
        if (currentRole === 'admin' && newRole === 'main_admin') { showToast('Only main admin can assign main admin', 'error'); return; }
        
        if (!userId || userId.trim() === '') {
          showToast('Error: Invalid user ID', 'error');
          return;
        }
        
        try {
          // Check if target user is super admin
          const userDoc = await db.collection('users').doc(userId).get();
          if (userDoc.exists && SUPER_ADMINS.includes(userDoc.data().email)) {
            showToast('Cannot change role of super admin', 'error');
            return;
          }
          
          await db.collection('users').doc(userId).update({ role: newRole });
          showToast('Role updated successfully', 'success'); 
          loadRolesManagement();
        } catch(e) {
          showToast('Error changing role: ' + e.message, 'error');
        }
      };

      window._appointRole = async () => {
        const email = document.getElementById('newAdminEmail')?.value.trim();
        const role = document.getElementById('newRoleSelect')?.value;
        if (!email) {
          showToast('Please enter an email', 'warning');
          return;
        }
        
        try {
          const snap = await db.collection('users').where('email','==',email).get();
          if (snap.empty) { showToast('User not found', 'error'); return; }
          const doc = snap.docs[0];
          const userData = doc.data();
          
          if (SUPER_ADMINS.includes(userData.email)) {
            showToast('Cannot modify super admin', 'error');
            return;
          }
          
          if (currentRole === 'admin' && role === 'main_admin') { 
            showToast('Cannot appoint main admin', 'error'); 
            return; 
          }
          
          await db.collection('users').doc(doc.id).update({ role: role });
          showToast(`Appointed as ${getRoleDisplayName(role)}!`, 'success'); 
          document.getElementById('newAdminEmail').value = '';
          loadRolesManagement();
        } catch(e) {
          showToast('Error appointing role: ' + e.message, 'error');
        }
      };

      // Generic delete function for other collections
      window._deleteDoc = async (collection, id) => {
        if (!canDelete()) {
          showToast('You do not have permission to delete', 'error');
          return;
        }
        
        if (!id || id.trim() === '') {
          showToast('Error: Invalid document ID', 'error');
          return;
        }
        
        if(confirm(`Are you sure you want to permanently delete this record from ${collection}?`)) {
          try {
            await db.collection(collection).doc(id).delete();
            showToast('Deleted successfully', 'success');
            const activeTab = document.querySelector('.nav-item.active')?.dataset?.tab;
            if (activeTab) loadTab(activeTab);
          } catch(e) {
            showToast('Error deleting: ' + e.message, 'error');
          }
        }
      };

    })();
  </script>
</body>
</html>
